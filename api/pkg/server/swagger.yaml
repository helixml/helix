definitions:
  api.AddBotParentRequest:
    properties:
      parent_id:
        type: string
    type: object
  api.BotActivateDTO:
    properties:
      activation_id:
        type: string
      agent_app_id:
        type: string
      project_id:
        type: string
      session_id:
        type: string
    type: object
  api.BotBadge:
    properties:
      id:
        type: string
    type: object
  api.BotChatDTO:
    properties:
      agent_app_id:
        type: string
      project_id:
        type: string
    type: object
  api.BotDTO:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      organization_id:
        type: string
      parent_ids:
        items:
          type: string
        type: array
      preserve_context:
        description: |-
          PreserveContext, when true, stops the runtime from wiping this
          Bot's chat session before each re-activation, so it accumulates
          context across triggers (e.g. Slack). Defaults to false.
        type: boolean
      tools:
        items:
          type: string
        type: array
      topics:
        items:
          type: string
        type: array
      updated_at:
        type: string
    type: object
  api.BotDetailDTO:
    properties:
      agent_app_id:
        description: AgentAppID + ProjectID — see BotChatDTO comments.
        type: string
      bot:
        $ref: '#/definitions/api.BotDTO'
      project_id:
        type: string
    type: object
  api.BotSubscriptionDTO:
    properties:
      created_at:
        type: string
      topic_id:
        type: string
    type: object
  api.BotSubscriptionsResponse:
    properties:
      bot_id:
        type: string
      subscriptions:
        items:
          $ref: '#/definitions/api.BotSubscriptionDTO'
        type: array
    type: object
  api.CreateBotRequest:
    properties:
      content:
        type: string
      id:
        type: string
      parent_id:
        type: string
      preserve_context:
        type: boolean
      tools:
        items:
          type: string
        type: array
      topics:
        items:
          type: string
        type: array
    type: object
  api.CreateBotResponse:
    properties:
      activation_id:
        type: string
      id:
        type: string
    type: object
  api.CreateTopicRequest:
    properties:
      as:
        description: |-
          As is the Bot that creates the topic — the bot whose chat
          the human is in. Empty leaves the topic unattributed (CreatedBy is
          cosmetic: it only anchors the node on the chart).
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      transport:
        $ref: '#/definitions/api.TransportRequestField'
    type: object
  api.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  api.EventCard:
    properties:
      body:
        type: string
      created_at:
        type: string
      from:
        type: string
      has_message:
        type: boolean
      id:
        type: string
      message_body:
        type: string
      source:
        type: string
      subject:
        type: string
      to:
        type: string
      topic_id:
        type: string
    type: object
  api.GitHubInstallationStatus:
    properties:
      app_exists:
        description: |-
          AppExists is true when a Helix GitHub App has been created/registered
          for this org (a github_app ServiceConnection exists), even if not yet
          installed on any repo. Drives the gate's create-vs-install branch.
        type: boolean
      install_url:
        description: |-
          InstallURL is where the New Topic gate sends the user to install the
          app (https://github.com/apps/<slug>/installations/new). Populated from
          the created app's slug, or from GITHUB_APP_SLUG for a pre-existing app.
        type: string
      installed:
        description: |-
          Installed is true when the Helix GitHub App has an installation for
          this org (a github_app ServiceConnection with an installation id).
        type: boolean
      manage_url:
        description: |-
          ManageURL is the app's developer-settings page on GitHub
          (github.com/organizations/<owner>/settings/apps/<slug>) — where you edit
          permissions, repos, and delete the app. Empty when the owner is unknown
          (e.g. a BYO app configured without it).
        type: string
    type: object
  api.GitHubManifestStartResponse:
    properties:
      manifest:
        type: string
      post_url:
        type: string
      state:
        type: string
    type: object
  api.GitHubRepoDTO:
    properties:
      full_name:
        type: string
      private:
        type: boolean
    type: object
  api.GitHubReposResponse:
    properties:
      repos:
        items:
          $ref: '#/definitions/api.GitHubRepoDTO'
        type: array
      source:
        description: |-
          Source identifies which token paid for this list — useful
          when debugging "I can't see repo X" reports.
        type: string
    type: object
  api.GitHubWebhookStatusResponse:
    properties:
      active:
        type: boolean
      detail:
        description: Detail explains a "unknown" state (and is empty otherwise).
        type: string
      payload_url:
        type: string
      state:
        description: |-
          State is one of:
            "installed" — a webhook for this topic's payload URL exists on the repo
            "missing"   — GitHub was reachable and has no such webhook (needs install)
            "unknown"   — couldn't determine (no repo / no public URL / no creds /
                          GitHub error); see Detail. The UI falls back to stored state.
        type: string
      webhook_html_url:
        type: string
      webhook_id:
        type: integer
    type: object
  api.InstallGitHubWebhookResponse:
    properties:
      payload_url:
        type: string
      warning:
        description: |-
          Warning is a non-fatal message about the just-installed
          webhook — e.g. "SERVER_URL is a loopback address so GitHub's
          servers can't actually deliver to this URL". The webhook IS
          installed on GitHub; the warning just tells the operator
          what needs fixing on their side for deliveries to flow.
        type: string
      webhook_html_url:
        type: string
      webhook_id:
        type: integer
    type: object
  api.MessageAttributes:
    properties:
      body:
        type: string
      created_at:
        type: string
      from:
        type: string
      has_message:
        type: boolean
      raw:
        description: |-
          Raw is the canonical Message envelope JSON exactly as stored — the
          same shape a processor's `.Message` template/filter context sees
          ({"from":…,"subject":…,"body":…,"thread_id":…,…}). Lets the UI show
          operators which fields are available.
        type: string
      source:
        type: string
      subject:
        type: string
      to:
        items:
          type: string
        type: array
      topic_id:
        type: string
    type: object
  api.MessageResource:
    properties:
      attributes:
        $ref: '#/definitions/api.MessageAttributes'
      id:
        type: string
      type:
        type: string
    type: object
  api.MessagesDocument:
    properties:
      data:
        items:
          $ref: '#/definitions/api.MessageResource'
        type: array
      links:
        additionalProperties:
          type: string
        type: object
      meta:
        $ref: '#/definitions/api.MessagesMeta'
    type: object
  api.MessagesMeta:
    properties:
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  api.OrgOverview:
    properties:
      bots:
        items:
          $ref: '#/definitions/api.BotBadge'
        type: array
    type: object
  api.ProcessorOutputDTO:
    properties:
      label:
        type: string
      managed_for:
        description: |-
          ManagedFor is set when this route is auto-managed by a reconciler for
          the named Worker (the Slack auto-router). Empty for human-authored
          routes. Read-only — the UI surfaces it; reconcilers own these routes.
        type: string
      match:
        type: string
      owned:
        type: boolean
      topic_id:
        type: string
    type: object
  api.ProcessorWriteRequest:
    properties:
      data:
        properties:
          attributes:
            properties:
              config:
                additionalProperties: true
                type: object
              created_by:
                type: string
              input_topic_id:
                type: string
              kind:
                type: string
              name:
                type: string
              outputs:
                items:
                  $ref: '#/definitions/api.ProcessorOutputDTO'
                type: array
            type: object
          type:
            type: string
        type: object
    type: object
  api.PublishRequest:
    properties:
      as:
        description: |-
          As is the Bot the message is sent as — the bot whose chat the
          human is in. Empty means human/system-origin (the dispatcher treats
          it as such). There is no global "owner" sender any more.
        type: string
      body:
        type: string
      subject:
        type: string
      to:
        items:
          type: string
        type: array
    type: object
  api.PublishResponse:
    properties:
      event_id:
        type: string
    type: object
  api.SetSettingRequest:
    properties:
      value:
        type: string
    type: object
  api.SettingsResponse:
    properties:
      db_path:
        type: string
      public_url:
        type: string
      specs:
        items:
          $ref: '#/definitions/api.SettingsSpecDTO'
        type: array
    type: object
  api.SettingsSpecDTO:
    properties:
      configured:
        type: boolean
      description:
        type: string
      key:
        type: string
      required:
        type: boolean
      type:
        type: string
      value:
        type: string
    type: object
  api.SubscribeBotRequest:
    properties:
      topic_id:
        type: string
    type: object
  api.ToolDTO:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  api.TopicDTO:
    properties:
      can_publish:
        type: boolean
      config:
        additionalProperties: true
        type: object
      created_at:
        type: string
      created_by:
        type: string
      description:
        type: string
      disable_reason:
        type: string
      effective_public_url:
        type: string
      id:
        type: string
      kind:
        type: string
      name:
        type: string
      recent_events:
        items:
          $ref: '#/definitions/api.EventCard'
        type: array
      subscribers:
        items:
          type: string
        type: array
    type: object
  api.TopicsResponse:
    properties:
      recent:
        items:
          $ref: '#/definitions/api.EventCard'
        type: array
      topics:
        items:
          $ref: '#/definitions/api.TopicDTO'
        type: array
    type: object
  api.TransportRequestField:
    properties:
      config:
        additionalProperties: true
        type: object
      kind:
        type: string
    type: object
  api.UpdateBotRequest:
    properties:
      content:
        type: string
      preserve_context:
        type: boolean
      tools:
        items:
          type: string
        type: array
      topics:
        items:
          type: string
        type: array
    type: object
  api.UpdateTopicRequest:
    properties:
      description:
        type: string
      name:
        type: string
      transport:
        $ref: '#/definitions/api.TransportRequestField'
    type: object
  filestore.Config:
    properties:
      folders:
        items:
          $ref: '#/definitions/filestore.Folder'
        type: array
      user_prefix:
        description: |-
          this will be the virtual path from the storage instance
          to the users root directory
          we use this to strip the full paths in the frontend so we can deal with only relative paths
        type: string
    type: object
  filestore.Folder:
    properties:
      name:
        type: string
      readonly:
        type: boolean
    type: object
  filestore.Item:
    properties:
      created:
        description: timestamp
        type: integer
      directory:
        description: is this thing a folder or not?
        type: boolean
      name:
        description: the filename
        type: string
      path:
        description: the relative path to the file from the base path of the storage
          instance
        type: string
      size:
        description: bytes
        type: integer
      url:
        description: the URL that can be used to load the object directly
        type: string
    type: object
  github_com_helixml_helix_api_pkg_server.ClientInfo:
    properties:
      avatar_url:
        type: string
      color:
        type: string
      id:
        type: integer
      last_seen:
        type: string
      last_x:
        type: integer
      last_y:
        type: integer
      user_id:
        type: string
      user_name:
        type: string
    type: object
  github_com_helixml_helix_api_pkg_types.Commit:
    properties:
      author:
        type: string
      email:
        type: string
      message:
        type: string
      sha:
        type: string
      timestamp:
        type: string
    type: object
  github_com_helixml_helix_api_pkg_types.Config:
    properties:
      rules:
        items:
          $ref: '#/definitions/types.Rule'
        type: array
    type: object
  github_com_helixml_helix_api_pkg_types.Runtime:
    enum:
    - ollama
    - diffusers
    - axolotl
    - vllm
    type: string
    x-enum-varnames:
    - RuntimeOllama
    - RuntimeDiffusers
    - RuntimeAxolotl
    - RuntimeVLLM
  github_com_mark3labs_mcp-go_mcp.Icon:
    properties:
      mimeType:
        description: Optional MIME type (e.g., "image/png", "image/svg+xml")
        type: string
      sizes:
        description: Optional size specifications (e.g., ["48x48"], ["any"] for SVG)
        items:
          type: string
        type: array
      src:
        description: URI pointing to the icon resource (HTTPS URL or data URI)
        type: string
    type: object
  github_com_mark3labs_mcp-go_mcp.Meta:
    properties:
      additionalFields:
        additionalProperties: {}
        description: |-
          AdditionalFields are any fields present in the Meta that are not
          otherwise defined in the protocol.
        type: object
      progressToken:
        description: |-
          If specified, the caller is requesting out-of-band progress
          notifications for this request (as represented by
          notifications/progress). The value of this parameter is an
          opaque token that will be attached to any subsequent
          notifications. The receiver is not obligated to provide these
          notifications.
    type: object
  github_com_mark3labs_mcp-go_mcp.Tool:
    properties:
      _meta:
        allOf:
        - $ref: '#/definitions/github_com_mark3labs_mcp-go_mcp.Meta'
        description: Meta is a metadata object that is reserved by MCP for storing
          additional information.
      annotations:
        allOf:
        - $ref: '#/definitions/mcp.ToolAnnotation'
        description: Optional properties describing tool behavior
      defer_loading:
        description: Support for deferred loading
        type: boolean
      description:
        description: A human-readable description of the tool.
        type: string
      execution:
        allOf:
        - $ref: '#/definitions/mcp.ToolExecution'
        description: Execution describes execution behavior for the tool
      icons:
        description: Icons provides visual identifiers for the tool
        items:
          $ref: '#/definitions/github_com_mark3labs_mcp-go_mcp.Icon'
        type: array
      inputSchema:
        allOf:
        - $ref: '#/definitions/mcp.ToolInputSchema'
        description: A JSON Schema object defining the expected parameters for the
          tool.
      name:
        description: The name of the tool.
        type: string
      outputSchema:
        allOf:
        - $ref: '#/definitions/mcp.ToolOutputSchema'
        description: A JSON Schema object defining the expected output returned by
          the tool .
    type: object
  goose.RecipeParameter:
    properties:
      default:
        type: string
      description:
        type: string
      input_type:
        type: string
      key:
        type: string
      options:
        items:
          type: string
        type: array
      requirement:
        type: string
    type: object
  gorm.DeletedAt:
    properties:
      time:
        type: string
      valid:
        description: Valid is true if Time is not NULL
        type: boolean
    type: object
  hydra.ContainerBlkioStats:
    properties:
      read_bytes:
        type: integer
      session_id:
        type: string
      write_bytes:
        type: integer
    type: object
  hydra.DevContainerStatus:
    enum:
    - starting
    - running
    - stopped
    - error
    type: string
    x-enum-varnames:
    - DevContainerStatusStarting
    - DevContainerStatusRunning
    - DevContainerStatusStopped
    - DevContainerStatusError
  hydra.DevContainerType:
    enum:
    - sway
    - ubuntu
    - headless
    type: string
    x-enum-comments:
      DevContainerTypeHeadless: No GUI, just agent (future)
      DevContainerTypeSway: Sway compositor with Zed
      DevContainerTypeUbuntu: GNOME with Zed
    x-enum-varnames:
    - DevContainerTypeSway
    - DevContainerTypeUbuntu
    - DevContainerTypeHeadless
  hydra.ListSandboxCommandsResponse:
    properties:
      commands:
        items:
          $ref: '#/definitions/hydra.SandboxCommandResponse'
        type: array
    type: object
  hydra.ListSandboxFilesResponse:
    properties:
      entries:
        items:
          $ref: '#/definitions/hydra.SandboxFileEntry'
        type: array
      path:
        type: string
    type: object
  hydra.SandboxCommandResponse:
    properties:
      args:
        items:
          type: string
        type: array
      cmd:
        type: string
      cwd:
        type: string
      detached:
        type: boolean
      exit_code:
        type: integer
      finished_at:
        type: string
      id:
        type: string
      sandbox_id:
        type: string
      started_at:
        type: string
      status:
        type: string
      stderr:
        type: string
      stdout:
        type: string
      sudo:
        type: boolean
    type: object
  hydra.SandboxFileEntry:
    properties:
      is_dir:
        type: boolean
      mod_time:
        type: string
      mode:
        type: string
      name:
        type: string
      path:
        type: string
      size:
        type: integer
    type: object
  mcp.TaskSupport:
    enum:
    - forbidden
    - optional
    - required
    type: string
    x-enum-varnames:
    - TaskSupportForbidden
    - TaskSupportOptional
    - TaskSupportRequired
  mcp.ToolAnnotation:
    properties:
      destructiveHint:
        description: If true, the tool may perform destructive updates
        type: boolean
      idempotentHint:
        description: If true, repeated calls with same args have no additional effect
        type: boolean
      openWorldHint:
        description: If true, tool interacts with external entities
        type: boolean
      readOnlyHint:
        description: If true, the tool does not modify its environment
        type: boolean
      title:
        description: Human-readable title for the tool
        type: string
    type: object
  mcp.ToolExecution:
    properties:
      taskSupport:
        allOf:
        - $ref: '#/definitions/mcp.TaskSupport'
        description: TaskSupport indicates whether the tool supports task augmentation.
    type: object
  mcp.ToolInputSchema:
    properties:
      $defs:
        additionalProperties: {}
        type: object
      additionalProperties: {}
      properties:
        additionalProperties: {}
        type: object
      required:
        items:
          type: string
        type: array
      type:
        type: string
    type: object
  mcp.ToolOutputSchema:
    properties:
      $defs:
        additionalProperties: {}
        type: object
      additionalProperties: {}
      properties:
        additionalProperties: {}
        type: object
      required:
        items:
          type: string
        type: array
      type:
        type: string
    type: object
  openai.ChatCompletionChoice:
    properties:
      content_filter_results:
        $ref: '#/definitions/openai.ContentFilterResults'
      finish_reason:
        allOf:
        - $ref: '#/definitions/openai.FinishReason'
        description: |-
          FinishReason
          stop: API returned complete message,
          or a message terminated by one of the stop sequences provided via the stop parameter
          length: Incomplete model output due to max_tokens parameter or token limit
          function_call: The model decided to call a function
          content_filter: Omitted content due to a flag from our content filters
          null: API response still in progress or incomplete
      index:
        type: integer
      logprobs:
        $ref: '#/definitions/openai.LogProbs'
      message:
        $ref: '#/definitions/openai.ChatCompletionMessage'
    type: object
  openai.ChatCompletionMessage:
    properties:
      content:
        type: string
      function_call:
        $ref: '#/definitions/openai.FunctionCall'
      multiContent:
        items:
          $ref: '#/definitions/openai.ChatMessagePart'
        type: array
      name:
        description: |-
          This property isn't in the official documentation, but it's in
          the documentation for the official library for python:
          - https://github.com/openai/openai-python/blob/main/chatml.md
          - https://github.com/openai/openai-cookbook/blob/main/examples/How_to_count_tokens_with_tiktoken.ipynb
        type: string
      reasoning_content:
        description: |-
          This property is used for the "reasoning" feature supported by deepseek-reasoner
          which is not in the official documentation.
          the doc from deepseek:
          - https://api-docs.deepseek.com/api/create-chat-completion#responses
        type: string
      refusal:
        type: string
      role:
        type: string
      tool_call_id:
        description: For Role=tool prompts this should be set to the ID given in the
          assistant's prior request to call a tool.
        type: string
      tool_calls:
        description: For Role=assistant prompts this may be set to the tool calls
          generated by the model, such as function calls.
        items:
          $ref: '#/definitions/openai.ToolCall'
        type: array
    type: object
  openai.ChatCompletionRequest:
    properties:
      chat_template_kwargs:
        additionalProperties: {}
        description: |-
          ChatTemplateKwargs provides a way to add non-standard parameters to the request body.
          Additional kwargs to pass to the template renderer. Will be accessible by the chat template.
          Such as think mode for qwen3. "chat_template_kwargs": {"enable_thinking": false}
          https://qwen.readthedocs.io/en/latest/deployment/vllm.html#thinking-non-thinking-modes
        type: object
      frequency_penalty:
        type: number
      function_call:
        description: 'Deprecated: use ToolChoice instead.'
      functions:
        description: 'Deprecated: use Tools instead.'
        items:
          $ref: '#/definitions/openai.FunctionDefinition'
        type: array
      guided_choice:
        description: |-
          GuidedChoice is a vLLM-specific extension that restricts the model's output
          to one of the predefined string choices provided in this field. This feature
          is used to constrain the model's responses to a controlled set of options,
          ensuring predictable and consistent outputs in scenarios where specific
          choices are required.
        items:
          type: string
        type: array
      logit_bias:
        additionalProperties:
          type: integer
        description: |-
          LogitBias is must be a token id string (specified by their token ID in the tokenizer), not a word string.
          incorrect: `"logit_bias":{"You": 6}`, correct: `"logit_bias":{"1639": 6}`
          refs: https://platform.openai.com/docs/api-reference/chat/create#chat/create-logit_bias
        type: object
      logprobs:
        description: |-
          LogProbs indicates whether to return log probabilities of the output tokens or not.
          If true, returns the log probabilities of each output token returned in the content of message.
          This option is currently not available on the gpt-4-vision-preview model.
        type: boolean
      max_completion_tokens:
        description: |-
          MaxCompletionTokens An upper bound for the number of tokens that can be generated for a completion,
          including visible output tokens and reasoning tokens https://platform.openai.com/docs/guides/reasoning
        type: integer
      max_tokens:
        description: |-
          MaxTokens The maximum number of tokens that can be generated in the chat completion.
          This value can be used to control costs for text generated via API.
          Deprecated: use MaxCompletionTokens. Not compatible with o1-series models.
          refs: https://platform.openai.com/docs/api-reference/chat/create#chat-create-max_tokens
        type: integer
      messages:
        items:
          $ref: '#/definitions/openai.ChatCompletionMessage'
        type: array
      metadata:
        additionalProperties:
          type: string
        description: Metadata to store with the completion.
        type: object
      model:
        type: string
      "n":
        type: integer
      parallel_tool_calls:
        description: 'Disable the default behavior of parallel tool calls by setting
          it: false.'
      prediction:
        allOf:
        - $ref: '#/definitions/openai.Prediction'
        description: Configuration for a predicted output.
      presence_penalty:
        type: number
      reasoning_effort:
        description: Controls effort on reasoning for reasoning models. It can be
          set to "low", "medium", or "high".
        type: string
      response_format:
        $ref: '#/definitions/openai.ChatCompletionResponseFormat'
      safety_identifier:
        description: |-
          A stable identifier used to help detect users of your application that may be violating OpenAI's usage policies.
          The IDs should be a string that uniquely identifies each user.
          We recommend hashing their username or email address, in order to avoid sending us any identifying information.
          https://platform.openai.com/docs/api-reference/chat/create#chat_create-safety_identifier
        type: string
      seed:
        type: integer
      service_tier:
        allOf:
        - $ref: '#/definitions/openai.ServiceTier'
        description: Specifies the latency tier to use for processing the request.
      stop:
        items:
          type: string
        type: array
      store:
        description: |-
          Store can be set to true to store the output of this completion request for use in distillations and evals.
          https://platform.openai.com/docs/api-reference/chat/create#chat-create-store
        type: boolean
      stream:
        type: boolean
      stream_options:
        allOf:
        - $ref: '#/definitions/openai.StreamOptions'
        description: 'Options for streaming response. Only set this when you set stream:
          true.'
      temperature:
        type: number
      tool_choice:
        description: This can be either a string or an ToolChoice object.
      tools:
        items:
          $ref: '#/definitions/openai.Tool'
        type: array
      top_logprobs:
        description: |-
          TopLogProbs is an integer between 0 and 5 specifying the number of most likely tokens to return at each
          token position, each with an associated log probability.
          logprobs must be set to true if this parameter is used.
        type: integer
      top_p:
        type: number
      user:
        type: string
      verbosity:
        description: |-
          Verbosity determines how many output tokens are generated. Lowering the number of
          tokens reduces overall latency. It can be set to "low", "medium", or "high".
          Note: This field is only confirmed to work with gpt-5, gpt-5-mini and gpt-5-nano.
          Also, it is not in the API reference of chat completion at the time of writing,
          though it is supported by the API.
        type: string
    type: object
