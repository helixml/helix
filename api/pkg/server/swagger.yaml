  types.CodeAgentConfig:
    properties:
      agent_name:
        description: AgentName is the name used in Zed's agent_servers config (e.g.,
          "qwen", "claude-code")
        type: string
      api_type:
        description: 'APIType specifies the API format: "anthropic", "openai", or
          "azure_openai"'
        type: string
      base_url:
        description: BaseURL is the Helix proxy endpoint URL (e.g., "https://helix.example.com/v1")
        type: string
      goose_baked_recipe:
        allOf:
        - $ref: '#/definitions/types.CodeAgentBakedRecipe'
        description: |-
          GooseBakedRecipe, when set, holds a single recipe with parameters
          pre-substituted, used by Phase 2b spec-task automation. The daemon
          writes it to disk and registers a single slash_command so an initial
          "/<slug>" prompt fires the recipe.
      goose_recipe_root_dir:
        description: |-
          GooseRecipeRootDir is the absolute container path to the root of the
          recipes git repo (used as GOOSE_RECIPE_PATH so subrecipes/fragments
          resolve relative paths correctly).
        type: string
      goose_recipes:
        description: |-
          GooseRecipes lists project-declared Goose recipes with absolute paths
          resolved inside the desktop container. Only set when Runtime is
          goose_code; consumed by settings-sync-daemon to write the goose
          slash_commands config.
        items:
          $ref: '#/definitions/types.CodeAgentGooseRecipe'
        type: array
      max_output_tokens:
        description: |-
          MaxOutputTokens is the model's max completion tokens
          Looked up from model_info.json, 0 if not found
        type: integer
      max_tokens:
        description: |-
          MaxTokens is the model's context window size (max input tokens)
          Looked up from model_info.json, 0 if not found
        type: integer
      model:
        description: Model is the model identifier (e.g., "claude-sonnet-4-5-latest",
          "gpt-4o")
        type: string
      provider:
        description: Provider is the LLM provider name (e.g., "anthropic", "openai",
          "openrouter")
        type: string
      runtime:
        allOf:
        - $ref: '#/definitions/types.CodeAgentRuntime'
        description: 'Runtime specifies which code agent runtime to use: "zed_agent"
          or "qwen_code"'
    type: object
