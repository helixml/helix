host: app.helix.ml
info:
  contact:
    email: info@helix.ml
    name: Helix support
    url: https://app.helix.ml/
  description: This is the HelixML API.
  title: HelixML API reference
  version: "0.1"
  x-logo:
    altText: Helix logo
    url: https://avatars.githubusercontent.com/u/149581110?s=200&v=4
paths:
  /api/v1/admin/agent-sandboxes/debug:
    get:
      consumes:
      - application/json
      description: Retrieves debug data for agent sandboxes (Hydra-based) including
        GPU stats, dev containers, and connected clients
      parameters:
      - description: Sandbox instance ID to query
        in: query
        name: sandbox_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.AgentSandboxesDebugResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/system.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/system.HTTPError'
      security:
      - ApiKeyAuth: []
      summary: Get sandbox debugging data
      tags:
      - Admin
  /api/v1/admin/agent-sandboxes/events:
    get:
      consumes:
      - application/json
      description: Streams Server-Sent Events for real-time sandbox monitoring
      produces:
      - text/event-stream
      responses:
        "200":
          description: 'event: message'
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/system.HTTPError'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/system.HTTPError'
      security:
      - ApiKeyAuth: []
      summary: Get sandbox real-time events (SSE)
      tags:
      - Admin
  /api/v1/admin/kodit/queue:
    get:
      description: List all pending tasks across all repositories with pagination.
        Admin only.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 25, max 100)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
