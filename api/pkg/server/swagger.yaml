  /api/v1/sessions/{id}/restart-agent:
    post:
      description: |-
        Tears down the half-dead desktop container and brings up a fresh one
        via the same resume path used by /sessions/{id}/resume. The session's
        ZedThreadID is preserved, so Zed reloads the existing thread from the
        persistent threads.db in the workspace volume and the underlying agent
        (claude-code, qwen, etc.) reloads its session from disk — prior
        conversation context is restored. Crashed prompts are reset to pending
        and the queue is kicked so they re-dispatch on the new container.
        Requires the session to be an external Zed agent. Returns the count of
        prompts that were reset.
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/system.HTTPError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/system.HTTPError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/system.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/system.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/system.HTTPError'
      security:
      - BearerAuth: []
      summary: Restart the external agent after an in-container crash
      tags:
      - Sessions
