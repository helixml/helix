# Helix runner profile: 8xH100 production
#
# GPU compatibility (operator-declared, stored alongside this YAML):
#   vendor:        nvidia
#   architectures: [hopper]
#   model_match:   ^NVIDIA H100
#   min_vram:      85899345920   # 80 GiB
#
# This is the user's original example compose, reproduced as the canonical
# 8xH100 profile. All `volumes` mount points use /models (the runner's shared
# HF cache) per Decision 9 in design.md — operators porting from the original
# can change /prod/models to /models, no other path edits needed.

services:
  qwen3-vl-embedding:
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen3-embed
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /models:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN
      - HF_HUB_OFFLINE=1
    shm_size: 1g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    command:
      - --model
      - Qwen/Qwen3-VL-Embedding-8B
      - --runner
      - pooling
      - --trust-remote-code
      - --dtype
      - auto
      - --max-model-len
      - "8192"
      - --gpu-memory-utilization
      - "0.45"

  qwen3-text-embedding:
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen3-text-embed
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - /models:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN
      - HF_HUB_OFFLINE=1
    shm_size: 1g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    command:
      - --model
      - Qwen/Qwen3-Embedding-8B
      - --runner
      - pooling
      - --trust-remote-code
      - --dtype
      - auto
      - --max-model-len
      - "8192"
      - --gpu-memory-utilization
      - "0.45"

  qwen35-35b:
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen35-35b
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - /models:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN
      - HF_HUB_OFFLINE=1
    shm_size: 1g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    command:
      - --model
      - Qwen/Qwen3.5-35B-A3B-FP8
      - --trust-remote-code
      - --served-model-name
      - qwen3.5-35b
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "32768"
      - --gpu-memory-utilization
      - "0.90"
      - --limit-mm-per-prompt
      - '{"image":8,"video":0}'
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      - --reasoning-parser
      - qwen3

  minimax-m2-7:
    image: vllm/vllm-openai:minimax27
    container_name: vllm-minimax-m2-7
    ports:
      - "127.0.0.1:8003:8000"
    volumes:
      - /models:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN
    shm_size: 1g
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["2", "3", "4", "5"]
              capabilities: [gpu]
    command:
      - --model
      - MiniMaxAI/MiniMax-M2.7
      - --tensor-parallel-size
      - "4"
      - --tool-call-parser
      - minimax_m2
      - --reasoning-parser
      - minimax_m2
      - --enable-auto-tool-choice
      - --served-model-name
      - minimax-m2.7
      - --trust-remote-code
      - --compilation-config
      - '{"mode":3,"pass_config":{"fuse_minimax_qk_norm":true}}'

  gemma4-31b:
    image: vllm/vllm-openai:gemma4
    container_name: vllm-gemma4-31b
    ports:
      - "127.0.0.1:8004:8000"
    volumes:
      - /models:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN
      - HF_HUB_OFFLINE=1
    shm_size: 1g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["6"]
              capabilities: [gpu]
    command:
      - --model
      - google/gemma-4-26B-A4B-it
      - --trust-remote-code
      - --served-model-name
      - gemma-4-26b
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "131072"
      - --gpu-memory-utilization
      - "0.90"
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
