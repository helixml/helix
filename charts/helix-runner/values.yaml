# Default values for helix-runner.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

# Deployment strategy configuration
# Options: "auto", "RollingUpdate", "Recreate"
# "auto" will use Recreate for single GPU setups, RollingUpdate otherwise
deploymentStrategy: "auto"

image:
  repository: registry.helixml.tech/helix/runner
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

runner:
  # Your helix control-plane's URL
  host: ""
  # Runner token - can be specified directly or read from a Kubernetes secret
  token: ""
  # Alternative: read token from a Kubernetes secret (leave token empty when using this)
  # This allows sharing the same secret with the controlplane or storing tokens securely
  tokenExistingSecret: ""
  tokenExistingSecretKey: ""  # defaults to "token" if not specified
  # Hugging Face token (OPTIONAL - automatically distributed from control plane)
  # Only specify if you need a fallback token when control plane token is not configured
  huggingfaceToken: ""
  # Alternative: read Hugging Face token from a Kubernetes secret (leave huggingfaceToken empty when using this)
  huggingfaceTokenExistingSecret: ""
  huggingfaceTokenExistingSecretKey: ""  # defaults to "token" if not specified
  # Enable/disable the embedded Ollama runtime on the runner
  # Set to false if using an external LLM provider and don't need local model pulling
  ollamaEnabled: true
  # Additional environment variables to set on the runner container
  # Useful for proxy configuration, custom CA certs, etc.
  # Note: cannot override env vars already defined in the template (API_TOKEN, HF_TOKEN, RUNTIME_OLLAMA_ENABLED)
  # Example:
  #   extraEnv:
  #     - name: HTTPS_PROXY
  #       value: "http://proxy:8080"
  #     - name: HTTP_PROXY
  #       value: "http://proxy:8080"
  #     - name: NO_PROXY
  #       value: "localhost,127.0.0.1,10.0.0.0/8"
  extraEnv: []

# GPU configuration
# Number of GPUs this runner should manage
# Each runner pod will be allocated this many GPUs from Kubernetes
# The runner will automatically detect and use all allocated GPUs
gpuCount: 1

# GKE-specific setup for GPU containers
# Enables NVIDIA library path registration with ldconfig so that
# Ollama and vLLM can find libcuda.so on GKE nodes
# Set to true when running on Google Kubernetes Engine
gkeSetup: false

# Both node selectors and resources need to target
resources:
  limits:
    nvidia.com/gpu: '1'
  requests:
    nvidia.com/gpu: '1'

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
