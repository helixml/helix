# Example values for Azure Kubernetes Service (AKS)
#
# Prerequisites:
# 1. AKS cluster with a GPU node pool
#    # Create GPU node pool (AMD example):
#    az aks nodepool add \
#      --resource-group YOUR_RG \
#      --cluster-name YOUR_CLUSTER \
#      --name gpupool \
#      --node-count 1 \
#      --node-vm-size Standard_NV8ads_V710_v5 \
#      --labels gpu=amd gpu-type=v710 \
#      --node-taints "amd.com/gpu=present:NoSchedule"
#    # For NVIDIA GPUs, use Standard_NC* or Standard_ND* VM sizes instead.
# 2. Install the appropriate GPU device plugin:
#    # AMD: kubectl apply -f https://raw.githubusercontent.com/ROCm/k8s-device-plugin/master/k8s-ds-amdgpu-dp.yaml
#    # NVIDIA: kubectl apply -f https://raw.githubusercontent.com/NVIDIA/k8s-device-plugin/v0.14.1/nvidia-device-plugin.yml
# 3. Create a secret with the runner token:
#    kubectl create secret generic helix-sandbox-token --from-literal=token=YOUR_TOKEN
#
# API URL Configuration:
# ----------------------
# If sandbox runs in SAME cluster as control plane:
#   Use internal service URL (recommended):
#   --set sandbox.apiUrl=http://RELEASE_NAME-helix-controlplane.NAMESPACE.svc.cluster.local
#
# If sandbox runs in DIFFERENT cluster:
#   Use external URL with valid TLS certificate:
#   --set sandbox.apiUrl=https://your-helix-instance.com
#
# Install:
#   helm install helix-sandbox ./charts/helix-sandbox -f values-aks.yaml \
#     --set sandbox.apiUrl=http://my-helix-controlplane.helix.svc.cluster.local

replicaCount: 1

deployment:
  type: "Deployment"

podDisruptionBudget:
  enabled: false

sandbox:
  runnerTokenExistingSecret: "helix-sandbox-token"
  runnerTokenExistingSecretKey: "token"
  maxSandboxes: 5

# AKS with cgroup v2 breaks exec probes in privileged DinD containers.
# Disable probes until the sandbox exposes an HTTP health endpoint.
probes:
  liveness:
    enabled: false
  readiness:
    enabled: false

# GPU configuration
# resourceName is empty because the AMD Radeon PRO V710 is a visualization GPU
# that does not expose /dev/kfd, so the ROCm device plugin cannot detect it.
# The sandbox runs as a privileged container and accesses /dev/dri directly.
# If you are using the ROCm device plugin with a compute GPU (e.g., MI300X),
# set resourceName to "amd.com/gpu" so the scheduler enforces GPU availability.
gpu:
  vendor: "amd"
  amd:
    enabled: true
    resourceName: ""

# Target GPU nodes
nodeSelector:
  gpu: "amd"

tolerations:
  - key: "amd.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"

resources:
  requests:
    memory: "4Gi"
    cpu: "2"
  limits:
    memory: "12Gi"

persistence:
  dockerStorage:
    enabled: true
    size: 50Gi
    storageClassName: "managed-csi"
  hydraData:
    enabled: true
    size: 20Gi
    storageClassName: "managed-csi"
  workspaceData:
    enabled: true
    size: 50Gi
    storageClassName: "managed-csi"
