apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "helix-controlplane.fullname" . }}-test-connection"
  labels:
    {{- include "helix-controlplane.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: test
      image: busybox:1.37
      command: ['sh', '-c']
      args:
        - |
          set -e
          FULLNAME="{{ include "helix-controlplane.fullname" . }}"
          PORT="{{ .Values.service.port }}"

          echo "=== Helm Test: helix-controlplane ==="

          # Test 1: Controlplane service is reachable
          echo "Test 1: Controlplane service reachable..."
          wget -q -O /dev/null --timeout=10 "${FULLNAME}:${PORT}/" || {
            echo "FAIL: Cannot reach controlplane at ${FULLNAME}:${PORT}"
            exit 1
          }
          echo "PASS: Controlplane responds on ${FULLNAME}:${PORT}"

          # Test 2: API health endpoint returns valid response
          echo "Test 2: API health check..."
          HTTP_CODE=$(wget -q -O /dev/null --server-response --timeout=10 "${FULLNAME}:${PORT}/api/v1/status" 2>&1 | awk '/HTTP/{print $2}' | tail -1)
          if [ -z "$HTTP_CODE" ]; then
            echo "WARN: Could not parse HTTP status from /api/v1/status (endpoint may not exist in this version)"
          elif [ "$HTTP_CODE" -ge 500 ] 2>/dev/null; then
            echo "FAIL: /api/v1/status returned HTTP $HTTP_CODE"
            exit 1
          else
            echo "PASS: /api/v1/status returned HTTP $HTTP_CODE"
          fi

          {{- if .Values.searxng.enabled }}
          # Test 3: SearXNG service is reachable
          echo "Test 3: SearXNG service reachable..."
          wget -q -O /dev/null --timeout=10 "${FULLNAME}-searxng:8080/" || {
            echo "FAIL: Cannot reach SearXNG at ${FULLNAME}-searxng:8080"
            exit 1
          }
          echo "PASS: SearXNG responds"
          {{- end }}

          {{- if .Values.chrome.enabled }}
          # Test 4: Chrome service is reachable
          echo "Test 4: Chrome service reachable..."
          wget -q -O /dev/null --timeout=10 "${FULLNAME}-chrome:7317/" 2>/dev/null || {
            # Chrome may not respond to GET / but we check DNS/port
            echo "WARN: Chrome at ${FULLNAME}-chrome:7317 did not respond to GET (may be expected)"
          }
          echo "PASS: Chrome DNS resolves"
          {{- end }}

          {{- if .Values.pgvector.enabled }}
          # Test 5: PGVector service DNS resolves
          echo "Test 5: PGVector service DNS..."
          nslookup "${FULLNAME}-pgvector" > /dev/null 2>&1 || {
            echo "FAIL: Cannot resolve ${FULLNAME}-pgvector"
            exit 1
          }
          echo "PASS: PGVector DNS resolves"
          {{- end }}

          {{- if .Values.kodit.enabled }}
          # Test 6: Kodit vectorchord service DNS resolves
          echo "Test 6: Kodit vectorchord service DNS..."
          nslookup "${FULLNAME}-kodit-vectorchord" > /dev/null 2>&1 || {
            echo "FAIL: Cannot resolve ${FULLNAME}-kodit-vectorchord"
            exit 1
          }
          echo "PASS: Kodit vectorchord DNS resolves"
          {{- end }}

          echo ""
          echo "=== All tests passed ==="
  restartPolicy: Never
