apiVersion: v1
kind: Service
metadata:
  name: {{ include "helix-controlplane.fullname" . }}
  labels:
    {{- include "helix-controlplane.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.controlplane.vhostTLS.enabled }}
    - port: {{ .Values.controlplane.vhostTLS.httpsPort }}
      targetPort: https
      protocol: TCP
      name: https
    {{- if .Values.controlplane.vhostTLS.httpEnabled }}
    - port: {{ .Values.controlplane.vhostTLS.httpPort }}
      targetPort: http-acme
      protocol: TCP
      name: http-acme
    {{- end }}
    {{- end }}
  selector:
    app.kubernetes.io/component: controlplane
    {{- include "helix-controlplane.selectorLabels" . | nindent 4 }}
