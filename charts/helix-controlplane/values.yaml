# Default values for helix-controlplane.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""
  serverUrl: http://localhost:8080
  # Extra environment variables applied to all components (controlplane, chrome, searxng).
  # Useful for proxy configuration in environments where all outbound traffic must go through a proxy.
  # Example:
  #   extraEnv:
  #     - name: HTTPS_PROXY
  #       value: "http://proxy:8080"
  #     - name: HTTP_PROXY
  #       value: "http://proxy:8080"
  #     - name: NO_PROXY
  #       value: "localhost,127.0.0.1,.svc,.cluster.local"
  extraEnv: []

image:
  repository: ghcr.io/helixml/controlplane
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

searxng:
  enabled: true
  image:
    repository: searxng/searxng
    tag: "latest"

chrome:
  enabled: true
  image:
    repository: ghcr.io/go-rod/rod
    tag: "v0.115.0"
  # Extra environment variables for the Chrome container (in addition to global.extraEnv)
  extraEnv: []

controlplane:
  # Wait for PostgreSQL to be ready before starting the controlplane.
  # Prevents race conditions where the controlplane starts before the
  # database is fully initialized, causing migrations to fail silently.
  waitForPostgres: true
  # Timeout in seconds for waiting for PostgreSQL to be ready.
  waitForPostgresTimeout: 300
  logLevel: "INFO"
  runnerToken: ""
  runnerTokenExistingSecret: ""
  runnerTokenExistingSecretKey: ""
  # Encryption key for secrets at rest (SSH keys, PATs, etc.)
  # 64-character hex string (32 bytes for AES-256-GCM)
  # Generate with: openssl rand -hex 32
  encryptionKey: ""
  encryptionKeyExistingSecret: ""
  encryptionKeyExistingSecretKey: ""
  licenseKey: ""
  licenseKeyExistingSecret: ""
  licenseKeyExistingSecretKey: ""
  # Used for sending emails like password reset, agent notifications, etc.
  smtp:
    enabled: false
    host: ""
    port: 587
    username: ""
    password: ""
    from: ""
    to: ""
  # Can be regular (inbuilt auth), keycloak (external auth) or oidc (external auth)
  authProvider: "regular"
  keycloak:
    enabled: false
    url: ""
    frontendUrl: ""
    user: ""
    password: ""
    existingSecret: ""
    existingSecretUserKey: ""
    existingSecretPasswordKey: ""
  admin:
    userSource: "env"
    userIds: "all"
  # AI Providers management - controls if users can add their own AI provider API keys
  providersManagementEnabled: true
  sidecar:
    enabled: false
    name: sidecar
    image: curlimages/curl:8.11.1
    imagePullPolicy: IfNotPresent
    command:
      - "/bin/sh"
      - "-c"
    args:
      - 'echo "Hello World"'
  providers:
    vllm:
      baseUrl: ""
      apiKey: ""
      existingSecret: ""
      existingSecretApiKeyKey: ""
    openai:
      baseUrl: ""
      apiKey: ""
      existingSecret: ""
      existingSecretApiKeyKey: ""
    anthropic:
      baseUrl: ""
      apiKey: ""
      existingSecret: ""
      existingSecretApiKeyKey: ""
      vertexProjectID: ""
      vertexRegion: "global"
      vertexCredentialsJSON: "" # service account JSON string; takes precedence over vertexCredentialsSecret
      vertexCredentialsSecret: "" # k8s secret name containing service-account.json
      vertexCredentialsSecretKey: "key" # key within the secret
    togetherai:
      baseUrl: ""
      apiKey: ""
      existingSecret: ""
      existingSecretApiKeyKey: ""
  huggingface:
    token: ""
    existingSecret: ""
    existingSecretTokenKey: ""
  extraEnv: []
  kodit: {}
    # baseURL: # Defaults to http://{{ .Release.Name }}-kodit:8080
    # gitURL: # Defaults to http://{{ .Release.Name }}:80

  # Embedded TLS termination via certmagic + Let's Encrypt
  # (HELIX_VHOST_TLS_MODE=auto). Set enabled=true to expose :443 (and
  # optionally :80) on both the controlplane container and the Service.
  # Configure the actual TLS mode + ACME challenge via extraEnv above.
  vhostTLS:
    enabled: false
    httpsPort: 443
    # httpPort is only needed for the HTTP-01 ACME challenge. With
    # DNS-01 (HELIX_VHOST_ACME_DNS_PROVIDER=cloudflare) the API server
    # does not bind :80 — set httpEnabled to false to skip exposing it.
    httpEnabled: true
    httpPort: 80

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

terminationGracePeriodSeconds: 30

securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  # GKE-specific configuration
  gke:
    managedCertificate:
      # Enable to automatically create a Google-managed TLS certificate
      enabled: false
      # Optional: specify domains explicitly. If empty, uses ingress.hosts[].host
      domains: []

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 6
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 6

persistence:
  enabled: true
  mountPath: /helix/controlplane
  subPath: ""
  gitDataPath: ""
  storageClass: ""
  annotations: {}
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  existingClaim: ""
  selector: {}
  dataSource: {}

nodeSelector: {}

tolerations: []

affinity: {}

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "17-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: helix
    password: "oh-hallo-insecure-password"
    database: helix
    existingSecret: ""
    usernameKey: ""
    passwordKey: ""
    databaseKey: ""
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
    annotations: {}
    accessModes:
      - ReadWriteOnce
    existingClaim: ""
    selector: {}
    dataSource: {}
  # Resource requests and limits for the bundled PostgreSQL container.
  # Empty by default; set this for production use.
  resources: {}
  #   requests:
  #     cpu: 100m
  #     memory: 256Mi
  #   limits:
  #     memory: 1Gi
  external:
    host: ""
    port: 5432
    user: helix
    database: helix
    password: ""
    existingSecret: ""
    existingSecretHostKey: ""
    existingSecretPortKey: ""
    existingSecretUserKey: ""
    existingSecretDatabaseKey: ""
    existingSecretPasswordKey: ""

# Kodit configuration - Code indexing service
# Kodit is compiled into the controlplane binary as a Go library (not a separate container).
# It still requires a Vectorchord (PostgreSQL + pgvector) database for storing embeddings.
kodit:
  enabled: true

  # Database authentication (for kodit's vectorchord database)
  auth:
    username: "postgres"
    password: "kodit-password"
    database: "kodit"
    # Option: Use existing secret for all auth credentials
    existingSecret: ""
    usernameKey: "" # defaults to "username"
    passwordKey: "" # defaults to "password"
    databaseKey: "" # defaults to "database"

  # Enrichment endpoint configuration
  # Kodit uses the controlplane's own API as an LLM proxy for code enrichment
  enrichment:
    # Base URL for enrichment API (defaults to Helix controlplane)
    baseUrl: "" # Defaults to http://<fullname>:80/v1
    model: "kodit-model"
    parallelTasks: "3"
    timeout: "120"
    # API key for enrichment endpoint
    apiKey: ""
    # Option: Use existing secret for API key (recommended - use runner token secret)
    existingSecret: ""
    existingSecretKey: "" # defaults to "api-token"

  # Vectorchord (PostgreSQL + pgvector) configuration for kodit
  vectorchord:
    enabled: true
    image:
      repository: tensorchord/vchord-suite
      tag: pg17-20250601
      pullPolicy: IfNotPresent
    persistence:
      enabled: true
      size: "10Gi"
      storageClass: ""
      annotations: {}
      accessModes:
        - ReadWriteOnce
      existingClaim: ""
      selector: {}
      dataSource: {}
