# Form-factor x profile x scenarios matrix for RunPod-backed integration
# tests. The harness reads this file, provisions one RunPod pod per
# entry, applies the profile, runs the scenarios, tears the pod down.
#
# Each entry is independent and can run in parallel up to the harness's
# parallelism cap. Cost-control rules in the harness:
#   - 30 min soft / 35 min hard wall-clock per entry
#   - skipped if (sandbox image digest + profile YAML SHA + harness
#     code SHA) matches a prior green run in the result cache
#   - daily $ budget enforced before scheduling
#
# To skip a form factor temporarily, set `enabled: false`. To run only a
# subset, pass --only <id1>,<id2>,... to the harness.

# Default scenarios run for every entry unless overridden per-entry.
default_scenarios:
  - boot_smoke
  - compatibility_filter
  - assignment_apply
  - inference_roundtrip
  - profile_switch
  - clear_profile
  - incompatible_rejection

entries:
  # Consumer dev — RTX 4090 24 GiB. Validates "any-nvidia-dev" curated
  # profile path and the dev-spike-tiny shape.
  - id: rtx4090
    enabled: true
    runpod_gpu_type: NVIDIA GeForce RTX 4090
    gpu_count: 1
    region: US-CA-2
    profile: design/sample-profiles/any-nvidia-dev-single-gpu.yaml
    profile_metadata:
      vendor: nvidia
      architectures: []
      min_vram_bytes: 25769803776  # 24 GiB
    secondary_profiles_for_switch:
      - design/sample-profiles/dev-spike-tiny.yaml
    incompatible_profile: design/sample-profiles/8xH100-vllm.yaml  # needs Hopper

  # Single Hopper SXM. Validates FP8 chat path + "single-h100-35b" curated.
  - id: h100-sxm-1x
    enabled: true
    runpod_gpu_type: NVIDIA H100 80GB HBM3
    gpu_count: 1
    region: US-CA-2
    profile: design/sample-profiles/8xH100-vllm.yaml  # full file, but we
                                                      # only schedule the
                                                      # 35B service for the
                                                      # single-card case
    profile_metadata:
      vendor: nvidia
      architectures: [hopper]
      model_match: ^NVIDIA H100
      min_vram_bytes: 85899345920  # 80 GiB
    secondary_profiles_for_switch: []
    incompatible_profile: design/sample-profiles/amd-mi300x-vllm.yaml

  # Multi-GPU Hopper for tensor-parallel layouts.
  - id: h100-sxm-4x
    enabled: true
    runpod_gpu_type: NVIDIA H100 80GB HBM3
    gpu_count: 4
    region: US-CA-2
    profile: design/sample-profiles/8xH100-vllm.yaml  # full stack — 4 GPUs
                                                      # is enough for
                                                      # embeddings + 35B
    profile_metadata:
      vendor: nvidia
      architectures: [hopper]
      model_match: ^NVIDIA H100
      min_vram_bytes: 85899345920
    secondary_profiles_for_switch: []
    incompatible_profile: design/sample-profiles/any-nvidia-blackwell-4gpu.yaml

  # Single Ampere — A100 80GB. No FP8 path; confirms
  # vendor=nvidia + arch=ampere matching works without FP8.
  - id: a100-80gb-1x
    enabled: true
    runpod_gpu_type: NVIDIA A100 80GB PCIe
    gpu_count: 1
    region: US-CA-2
    profile: design/sample-profiles/any-nvidia-dev-single-gpu.yaml
    profile_metadata:
      vendor: nvidia
      architectures: [ampere]
      min_vram_bytes: 80000000000
    secondary_profiles_for_switch: []
    incompatible_profile: design/sample-profiles/8xH100-vllm.yaml  # H100-only

  # AMD MI300X — exercises the AMD device passthrough + ROCm path.
  - id: mi300x-1x
    enabled: true
    runpod_gpu_type: AMD MI300X
    gpu_count: 1
    region: US-CA-2
    profile: design/sample-profiles/amd-mi300x-vllm.yaml
    profile_metadata:
      vendor: amd
      architectures: [cdna3]
      model_match: MI300X
    secondary_profiles_for_switch: []
    incompatible_profile: design/sample-profiles/8xH100-vllm.yaml  # different vendor

  # Blackwell — deferred until RunPod offers B100/B200.
  - id: blackwell
    enabled: false  # waiting on availability
    runpod_gpu_type: NVIDIA B200
    gpu_count: 4
    region: US-CA-2
    profile: design/sample-profiles/any-nvidia-blackwell-4gpu.yaml
    profile_metadata:
      vendor: nvidia
      architectures: [blackwell]
    secondary_profiles_for_switch: []
    incompatible_profile: design/sample-profiles/8xH100-vllm.yaml  # Hopper-only
