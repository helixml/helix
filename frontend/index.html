<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover"
        />
        <meta name="color-scheme" content="dark light" />
        <meta
            name="description"
            content="Helix - AI-powered development platform"
        />

        <!-- PWA Meta Tags -->
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="Helix" />
        <meta name="theme-color" content="#4ade80" />
        <meta name="msapplication-TileColor" content="#0d0d0d" />

        <!-- Icons -->
        <link rel="icon" href="/img/favicon.png" />
        <link rel="apple-touch-icon" href="/img/favicon.png" />

        <!-- PWA Manifest -->
        <link rel="manifest" href="/manifest.json" />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
        />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/icon?family=Material+Icons"
        />
        <style>
            html,
            body,
            #root {
                height: 100%;
                margin: 0;
                padding: 0;
                overflow: hidden;
            }
        </style>
        <script type="text/javascript">
            // Set body bg + text color BEFORE React mounts so we don't flash
            // dark mode for users who prefer light. Mirrors the logic in
            // contexts/theme.tsx getInitialMode().
            (function () {
                var stored = null;
                try { stored = localStorage.getItem('themeMode'); } catch (e) {}
                var mode = stored === 'light' || stored === 'dark'
                    ? stored
                    : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches
                        ? 'light' : 'dark');
                var bg = mode === 'light' ? '#ffffff' : '#121214';
                var fg = mode === 'light' ? '#333' : '#e0e0e0';
                document.documentElement.style.backgroundColor = bg;
                document.documentElement.style.color = fg;
            })();
        </script>
        <script type="text/javascript">
            window.$crisp = [];
            window.CRISP_WEBSITE_ID = "d69e5955-fa6a-4fe6-b1bb-c87cf7515d09";
            (function () {
                d = document;
                s = d.createElement("script");
                s.src = "https://client.crisp.chat/l.js";
                s.async = 1;
                d.getElementsByTagName("head")[0].appendChild(s);
            })();
        </script>
        <script type="text/javascript">
            window.$crisp.push(["do", "chat:hide"]);
            window.$crisp.push([
                "on",
                "chat:closed",
                () => {
                    window.$crisp.push(["do", "chat:hide"]);
                },
            ]);
        </script>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/file-icon-vectors@1.0.0/dist/file-icon-vivid.min.css"
        />
        <title>Helix</title>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <div id="error-overlay"></div>
        <script type="module" src="/src/index.tsx"></script>
    </body>
</html>
