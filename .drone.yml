  - name: release-backend
    image: golang:1.25-bookworm
    volumes:
      - name: go-build-cache
        path: /root/.cache/go-build
      - name: go-mod-cache
        path: /go/pkg/mod
    when:
      event:
        - tag
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        if [ -n "$DRONE_TAG" ]; then
          VERSION_FLAG="-X github.com/helixml/helix/api/pkg/data.Version=$DRONE_TAG"
        else
          VERSION_FLAG=""
        fi
        # Build CLI binary (nokodit tag excludes kodit CGO dependencies) for all platforms
        for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
          os=$(echo "$target" | cut -d/ -f1)
          arch=$(echo "$target" | cut -d/ -f2)
          ext=""; [ "$os" = "windows" ] && ext=".exe"
          echo "Building helix-$os-$arch$ext"
          CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -tags nokodit -ldflags "-w -s $VERSION_FLAG" -o "helix-$os-$arch$ext" .
        done
      - ./helix-linux-amd64 version
      - apt-get update && apt-get install -y curl
      - curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
      - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
      - apt-get update && apt-get install -y gh
      - sed -i "s/\${HELIX_VERSION:-latest}/$DRONE_TAG/g" docker-compose.yaml
      - |
        if [ -n "$DRONE_TAG" ]; then
          # Look for either exact match or tag followed by space and description
          RELEASE=$(gh release list | awk -v tag="$DRONE_TAG" '$1 == tag || $1 ~ "^"tag" " {print $1; exit}')
          if [ -n "$RELEASE" ]; then
            echo "Uploading helix binaries, installer, and docker-compose.yaml to release $RELEASE"
            gh release upload --clobber "$RELEASE" helix-linux-amd64 helix-linux-arm64 helix-darwin-amd64 helix-darwin-arm64 helix-windows-amd64.exe docker-compose.yaml
          else
            echo "No matching release found for tag $DRONE_TAG"
          fi
        else
          echo "No tag present, skipping release upload"
        fi
    depends_on: [build-backend, build-frontend]

  - name: build-operator
    image: golang:1.25-alpine
    volumes:
      - name: go-build-cache
        path: /root/.cache/go-build
      - name: go-mod-cache
        path: /go/pkg/mod
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - cd operator && go mod tidy && go build ./...
    depends_on: []

  - name: run-linter-operator
    image: golangci/golangci-lint:v2.8.0-alpine
    volumes:
      - name: go-build-cache
        path: /root/.cache/go-build
      - name: go-mod-cache
        path: /go/pkg/mod
    commands:
      - cd operator && go mod tidy && golangci-lint run ./...
    when:
      event:
        - push
    depends_on: []

services:
  - name: postgres
    image: postgres:12.13-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
  - name: typesense
    image: typesense/typesense:27.0
    command: ["--data-dir", "/tmp", "--api-key", "typesense"]
  - name: tika
    image: apache/tika:2.9.2.1
  - name: chrome
    image: ghcr.io/go-rod/rod:v0.115.0
  - name: pgvector
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

