kind: pipeline
type: docker
name: default

trigger:
  event:
    - push
    - tag

workspace:
  base: /go
  path: src/github.com/helix-ml/helix

steps:
  - name: build-backend
    image: golang:1.25-alpine
    volumes:
      - name: go-build-cache
        path: /root/.cache/go-build
      - name: go-mod-cache
        path: /go/pkg/mod
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apk add --no-cache gcc g++ musl-dev
      - CGO_ENABLED=1 go build -tags "!rocm"
    when:
      event:
        - tag
    depends_on: []

  - name: build-frontend
    image: node:23-alpine
    volumes:
      - name: yarn-cache
        path: /usr/local/share/.cache/yarn
      - name: node-modules-cache
        path: /go/src/github.com/helix-ml/helix/frontend/node_modules
    commands:
      - cd frontend
      - yarn install --frozen-lockfile --check-files
      - npx tsc --noEmit -p tsconfig.json
      - yarn test
      - yarn build
    depends_on: []

  #  - name: run-linter
  #    image: golangci/golangci-lint:v2.8.0-alpine
  #    volumes:
  #      - name: go-build-cache
  #        path: /root/.cache/go-build
  #      - name: go-mod-cache
  #        path: /go/pkg/mod
  #    commands:
  #      - golangci-lint cache clean
  #      - golangci-lint run
  #    when:
  #      event:
  #        - push
  #    depends_on: []

  - name: helm-lint
    image: alpine/helm:3.16.4
    commands:
      # Fetch subchart dependencies (postgresql, common) before lint/template
      - helm dependency build charts/helix-controlplane
      # Lint all three charts with default values
      - helm lint charts/helix-controlplane
      - helm lint charts/helix-runner
      - helm lint charts/helix-sandbox
      # Lint controlplane with production-like example values
      - helm lint charts/helix-controlplane -f charts/helix-controlplane/values-example.yaml
      - helm lint charts/helix-runner -f charts/helix-runner/values-example.yaml
      # Template render to catch runtime errors (missing helpers, bad references)
      - helm template test-release charts/helix-controlplane -f charts/helix-controlplane/values-example.yaml > /dev/null
      - helm template test-release charts/helix-runner -f charts/helix-runner/values-example.yaml > /dev/null
      - helm template test-release charts/helix-sandbox > /dev/null
      # Template with each sandbox values variant
      - helm template test-release charts/helix-sandbox -f charts/helix-sandbox/values-bare-metal.yaml > /dev/null
      - helm template test-release charts/helix-sandbox -f charts/helix-sandbox/values-eks.yaml > /dev/null
      - helm template test-release charts/helix-sandbox -f charts/helix-sandbox/values-gke.yaml > /dev/null
      - helm template test-release charts/helix-sandbox -f charts/helix-sandbox/values-aks.yaml > /dev/null
    when:
      event:
        - push
    depends_on: []

  - name: check-for-secrets
    image: ghcr.io/gitleaks/gitleaks:v8.24.0
    commands:
      - gitleaks dir -v; rc=$?; if [ $rc -eq 1 ]; then echo "LEAKS FOUND"; exit 1; fi
    when:
      event:
        - push
    depends_on: [helm-lint]

  - name: shell-script-tests
    image: alpine:3.21
    commands:
      - apk add --no-cache bash git
      - git config --global user.email "ci@helix.ml"
      - git config --global user.name "CI"
      - chmod +x ./desktop/shared/test-helix-specs-creation.sh
      - ./desktop/shared/test-helix-specs-creation.sh
    when:
      event:
        - push
    depends_on: []

  # Build API binary once for migrations and integration tests.
  # This avoids recompiling in each step that needs the binary.
  - name: build-api-binary
    image: golang:1.25-alpine
    volumes:
      - name: go-build-cache
        path: /root/.cache/go-build
      - name: go-mod-cache
        path: /go/pkg/mod
    commands:
      - apk add --no-cache gcc g++ musl-dev
      - CGO_ENABLED=1 go build -ldflags "-s -w" -o ./helix-bin ./api
    when:
      event:
        - push
    depends_on: [clone]

  # Run database migrations once before parallel test steps.
  # This prevents race conditions where multiple test steps try to create
  # ENUM types simultaneously, causing "duplicate key" constraint errors.
  - name: run-migrations
    image: golang:1.25-alpine
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: postgres
    commands:
      - ./helix-bin serve --migrate-only
    when:
      event:
        - push
    depends_on: [build-api-binary]

  - name: unit-test
    image: golang:1.25-alpine
    volumes:
      - name: go-build-cache
        path: /root/.cache/go-build
      - name: go-mod-cache
        path: /go/pkg/mod
    environment:
      # Reduce log noise in CI - suppress trace/debug logs that bloat output
      LOG_LEVEL: "warn"
      # Disabled until tested with togetherai
      DISABLE_AGENT_TESTS: "true"
      # Skip migrations - already run by run-migrations step
      HELIX_SKIP_AUTOMIGRATE: "1"
      GEMINI_API_KEY:
        from_secret: GEMINI_API_KEY
      OPENAI_API_KEY:
        from_secret: openai_tools
      TOGETHER_API_KEY:
        from_secret: openai_api_key
      TOGETHER_BASE_URL:
        from_secret: openai_base_url
      # TODO: reenable
      # CI_ADO_TOKEN:
      #   from_secret: ci_ado_token
      # CI_ADO_REPO:
      #   from_secret: ci_ado_repo
      # Database config (running in a sidecar)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: postgres
      TYPESENSE_URL: http://typesense:8108
      TYPESENSE_API_KEY: typesense
      TEXT_EXTRACTION_TIKA_URL: http://tika:9998
      RAG_CRAWLER_LAUNCHER_URL: http://chrome:7317

    commands:
      - apk add --no-cache gcc g++ musl-dev git
      - git config --global user.email "ci@helix.ml"
      - git config --global user.name "CI"
      - chmod +x ./scripts/run-tests-with-timeout.sh
      # Run tests excluding GStreamer-dependent packages (tested separately with CGO disabled)
      - go list ./api/... | grep -v '/desktop' | grep -v '/desktop-bridge' | xargs ./scripts/run-tests-with-timeout.sh -timeout 8m -v
    when:
      event:
        - push
    depends_on: [run-migrations]

  - name: unit-test-nocgo
    image: golang:1.25-alpine
    volumes:
      - name: go-build-cache
        path: /root/.cache/go-build
      - name: go-mod-cache
        path: /go/pkg/mod
    commands:
      - apk add --no-cache git
      # Test GStreamer-dependent packages with CGO disabled (uses stub implementations)
      - CGO_ENABLED=0 go test -timeout 5m -v ./api/pkg/desktop/... ./api/cmd/desktop-bridge/...
    when:
      event:
        - push
    depends_on: []

  - name: api-integration-test
    image: golang:1.25-alpine
    volumes:
      - name: go-build-cache
        path: /root/.cache/go-build
      - name: go-mod-cache
        path: /go/pkg/mod
    environment:
      # Reduce log noise in CI - suppress trace/debug logs that bloat output
      LOG_LEVEL: "warn"
      # Skip migrations - already run by run-migrations step
      HELIX_SKIP_AUTOMIGRATE: "1"
      OPENAI_API_KEY:
        from_secret: openai_tools
      TOGETHER_API_KEY:
        from_secret: openai_api_key
      TOGETHER_BASE_URL:
        from_secret: openai_base_url
      # Database config (running in a sidecar)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: postgres
      TYPESENSE_URL: http://typesense:8108
      TYPESENSE_API_KEY: typesense
      TEXT_EXTRACTION_TIKA_URL: http://tika:9998
      RAG_CRAWLER_LAUNCHER_URL: http://chrome:7317
      ORGANIZATIONS_CREATE_ENABLED_FOR_NON_ADMINS: "true"
      START_HELIX_TEST_SERVER: "true"
      # Agent configuration
      REASONING_MODEL_PROVIDER: openai
      REASONING_MODEL: o3-mini
      REASONING_MODEL_EFFORT: none
      GENERATION_MODEL_PROVIDER: openai
      GENERATION_MODEL: gpt-4o
      SMALL_REASONING_MODEL_PROVIDER: openai
      SMALL_REASONING_MODEL: o3-mini
      SMALL_REASONING_MODEL_EFFORT: none
      SMALL_GENERATION_MODEL_PROVIDER: openai
      SMALL_GENERATION_MODEL: gpt-4o-mini

    commands:
      - apk add --no-cache gcc g++ musl-dev git
      - git config --global user.email "ci@helix.ml"
      - git config --global user.name "CI"
      - chmod +x ./scripts/run-tests-with-timeout.sh
      # Use pre-built binary from build-api-binary step
      - mkdir -p $GOPATH/bin && cp ./helix-bin $GOPATH/bin/helix
      # Debug: verify binary was copied and test server startup
      - which helix && helix version
      - timeout 5 helix serve 2>&1 || echo "Server exited (expected - checking for startup errors)"
      # Run tests
      - pwd && ./scripts/run-tests-with-timeout.sh -timeout 8m -v ./integration-test/api/...
    when:
      event:
        - push
    depends_on: [run-migrations]

