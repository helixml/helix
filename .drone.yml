kind: pipeline
type: docker
name: build-demos

trigger:
  ref:
    include:
      - refs/heads/main
      - refs/tags/*

volumes:
  - name: dockersocket
    host:
      path: /var/run/docker.sock

steps:
  - name: publish-demos
    image: plugins/docker
    pull: always
    settings:
      dockerfile: Dockerfile.demos
      auto_tag: true
      daemon_off: true
      pull_image: true
      registry: registry.helixml.tech
      repo: registry.helixml.tech/helix/demos
      username: admin
      password:
        from_secret: helix_registry_password
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock
    when:
      ref:
        include:
          - refs/heads/main
          - refs/tags/*

  - name: mirror-demos-to-ghcr
    image: docker:cli
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
      REGISTRY_PASSWORD:
        from_secret: helix_registry_password
    commands:
      - echo "$${REGISTRY_PASSWORD}" | docker login registry.helixml.tech -u admin --password-stdin
      - |
        # auto_tag produces "latest" on main, semver tags on git tags
        if [ -n "${DRONE_TAG}" ]; then
          VERSION="${DRONE_TAG}"
        else
          VERSION="latest"
        fi
        docker pull registry.helixml.tech/helix/demos:$${VERSION}
        scripts/ghcr-push.sh registry.helixml.tech/helix/demos:$${VERSION}
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock
    when:
      ref:
        include:
          - refs/heads/main
          - refs/tags/*
    depends_on: [publish-demos]

