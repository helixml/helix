---
# ====================================================================
# Sandbox Build Pipeline
# ====================================================================
# Builds the complete sandbox stack:
#   1. Zed binary (Rust, from helixml/zed)
#   2. qwen-code (Node.js, from helixml/qwen-code)
#   3. Desktop images (helix-sway, helix-ubuntu)
#   4. Sandbox image (embeds desktop tarballs)
#
# Versioning:
#   - Tags: use git tag (e.g., v1.2.3)
#   - Branches: use commit hash (e.g., abc123f)
#
# Caching:
#   Zed and qwen-code builds use Docker BuildKit cache mounts for
#   cargo/npm dependencies. No shared host volumes for build artifacts.
#
# No GPU required - builds work on standard runners.
# ====================================================================
kind: pipeline
type: docker
name: build-sandbox-amd64

platform:
  os: linux
  arch: amd64

trigger:
  ref:
    include:
      - refs/heads/main
      - refs/tags/*

volumes:
  - name: dockersocket
    host:
      path: /var/run/docker.sock
  - name: sandbox-build-cache
    host:
      path: /var/cache/drone/sandbox-build

steps:
  # Step 1: Clone external repositories (pinned commits from sandbox-versions.txt)
  # Pinned for reproducibility - update sandbox-versions.txt when upgrading deps
  # Optional: CI warns if pinned version is behind upstream HEAD
  #
  - name: clone-dependencies
    image: alpine/git:latest
    commands:
      - mkdir -p /drone/src/external /drone/src/cache
      # Read pinned versions
      - |
        . /drone/src/sandbox-versions.txt
        echo "Pinned versions: ZED=$${ZED_COMMIT} QWEN=$${QWEN_COMMIT}"
        echo "$${ZED_COMMIT}" > /drone/src/zed-commit.txt
        echo "$${QWEN_COMMIT}" > /drone/src/qwen-code-commit.txt
      # Warn if pinned versions are stale (informational only, doesn't fail)
      - |
        . /drone/src/sandbox-versions.txt
        ZED_HEAD=$$(git ls-remote https://github.com/helixml/zed.git HEAD | cut -f1)
        QWEN_HEAD=$$(git ls-remote https://github.com/helixml/qwen-code.git HEAD | cut -f1)
        if [ "$${ZED_COMMIT}" != "$${ZED_HEAD}" ]; then
          echo "⚠️  ZED_COMMIT is behind upstream HEAD ($${ZED_HEAD:0:12})"
        fi
        if [ "$${QWEN_COMMIT}" != "$${QWEN_HEAD}" ]; then
          echo "⚠️  QWEN_COMMIT is behind upstream HEAD ($${QWEN_HEAD:0:12})"
        fi
      # Always clone Zed source fresh at the pinned commit.
      # BuildKit handles caching of cargo deps and build artifacts.
      - |
        . /drone/src/sandbox-versions.txt
        echo "Cloning Zed at commit $${ZED_COMMIT}..."
        cd /
        rm -rf /drone/src/cache/zed-source
        git init /drone/src/cache/zed-source
        git -C /drone/src/cache/zed-source fetch --depth 1 https://github.com/helixml/zed.git $${ZED_COMMIT}
        git -C /drone/src/cache/zed-source checkout FETCH_HEAD
        echo "✓ Zed source at $$(git -C /drone/src/cache/zed-source rev-parse HEAD)"
      # Always clone qwen-code fresh at the pinned commit.
      - |
        . /drone/src/sandbox-versions.txt
        echo "Cloning qwen-code at commit $${QWEN_COMMIT}..."
        cd /
        rm -rf /drone/src/cache/qwen-source
        git init /drone/src/cache/qwen-source
        git -C /drone/src/cache/qwen-source fetch --depth 1 https://github.com/helixml/qwen-code.git $${QWEN_COMMIT}
        git -C /drone/src/cache/qwen-source checkout FETCH_HEAD
        echo "✓ qwen-code source at $$(git -C /drone/src/cache/qwen-source rev-parse HEAD)"
      - echo "=== Dependency versions ==="
      - echo "Zed:" && cat /drone/src/zed-commit.txt
      - echo "qwen-code:" && cat /drone/src/qwen-code-commit.txt
    volumes:
      - name: sandbox-build-cache
        path: /drone/src/cache

  # Step 2: Build qwen-code (with caching)
  # Builds qwen-code using Dockerfile.qwen-build with BuildKit cache for npm.
  - name: build-qwen-code
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    commands:
      - |
        QWEN_SOURCE="/drone/src/cache/qwen-source"

        if [ ! -f "$${QWEN_SOURCE}/package.json" ]; then
          echo "ERROR: qwen-code source not found at $${QWEN_SOURCE}"
          exit 1
        fi

        echo "Building qwen-code from source..."
        mkdir -p qwen-code-build
        docker build \
          --output type=local,dest=qwen-code-build \
          -f Dockerfile.qwen-build \
          "$${QWEN_SOURCE}"

        cat /drone/src/qwen-code-commit.txt > qwen-code-build/.git-commit-hash
        echo "qwen-code build complete"
        ls -la qwen-code-build/
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock
      - name: sandbox-build-cache
        path: /drone/src/cache
    depends_on:
      - clone-dependencies

  # Step 3: Build Zed binary
  # Builds Zed using the full Dockerfile.zed-build with BuildKit cache mounts.
  # No shared volumes, no flock — BuildKit handles caching and concurrency.
  - name: build-zed
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    commands:
      - |
        ZED_SOURCE="/drone/src/cache/zed-source"

        if [ ! -f "$${ZED_SOURCE}/Cargo.toml" ]; then
          echo "ERROR: Zed source not found at $${ZED_SOURCE}"
          exit 1
        fi

        ZED_SHA=$$(git -C "$${ZED_SOURCE}" rev-parse HEAD)
        if [ -z "$${ZED_SHA}" ]; then
          echo "ERROR: Could not determine Zed source commit"
          exit 1
        fi

        # Check binary cache (keyed by full commit hash)
        CACHE_DIR="/drone/src/cache/zed-bin-$${ZED_SHA}"
        if [ -f "$${CACHE_DIR}/zed" ]; then
          echo "✓ Using cached Zed binary for $${ZED_SHA}"
          mkdir -p zed-build
          cp "$${CACHE_DIR}/zed" zed-build/zed
          cp "$${CACHE_DIR}/app-icon.png" zed-build/app-icon.png
          chmod +x zed-build/zed
        else
          echo "Building Zed from source commit: $${ZED_SHA}"
          mkdir -p zed-build
          docker build \
            --build-arg BUILD_TYPE=release \
            --build-arg ZED_COMMIT_SHA=$${ZED_SHA} \
            --output type=local,dest=zed-build \
            -f Dockerfile.zed-build \
            "$${ZED_SOURCE}"

          cp "$${ZED_SOURCE}/crates/zed/resources/app-icon.png" zed-build/app-icon.png
          chmod +x zed-build/zed

          # Cache the binary for future builds with same commit
          mkdir -p "$${CACHE_DIR}"
          cp zed-build/zed "$${CACHE_DIR}/zed"
          cp zed-build/app-icon.png "$${CACHE_DIR}/app-icon.png"
          echo "✓ Cached Zed binary at $${CACHE_DIR}"
        fi
        ls -la zed-build/
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock
      - name: sandbox-build-cache
        path: /drone/src/cache
    depends_on:
      - clone-dependencies

  # Step 3b: Run Zed WebSocket E2E test
  # Builds a Go test server (imports real Helix server code) + runtime image,
  # then runs the multi-phase E2E test (thread creation, follow-ups, thread
  # transitions, UI state queries, open_thread). Uses multi-stage Docker build
  # to compile the Go test server with the current helix source.
  - name: zed-e2e-test
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      ANTHROPIC_API_KEY:
        from_secret: anthropic_api_key
    commands:
      - |
        ZED_COMMIT=$$(cat /drone/src/zed-commit.txt | head -c 12)
        ZED_SOURCE="/drone/src/cache/zed-source"

        # Verify Zed binary exists from build-zed step
        if [ ! -f "zed-build/zed" ]; then
          echo "ERROR: Zed binary not found - build-zed step must run first"
          exit 1
        fi

        # Use the Zed e2e-test dir as Docker context — only external inputs
        # are the pre-built zed binary and Helix Go source (for test server build)
        E2E_DIR="$${ZED_SOURCE}/crates/external_websocket_sync/e2e-test"

        # Clean up stale files from previous builds BEFORE copying.
        # Critical: if helix-api/ already exists from a failed build,
        # cp -r nests api/ inside it (creating helix-api/api/) which
        # breaks Go module resolution in the Docker build.
        # Use docker to remove as root — files may be root-owned from previous docker builds.
        docker run --rm -v "/var/cache/drone/sandbox-build/zed-source:/zed-source" alpine \
          rm -rf \
            "/zed-source/crates/external_websocket_sync/e2e-test/helix-api" \
            "/zed-source/crates/external_websocket_sync/e2e-test/helix-go.mod" \
            "/zed-source/crates/external_websocket_sync/e2e-test/helix-go.sum" \
            "/zed-source/crates/external_websocket_sync/e2e-test/zed-binary"

        cp zed-build/zed "$${E2E_DIR}/zed-binary"
        cp /drone/src/go.mod "$${E2E_DIR}/helix-go.mod"
        cp /drone/src/go.sum "$${E2E_DIR}/helix-go.sum"
        cp -r /drone/src/api "$${E2E_DIR}/helix-api"

        # Sync kodit version from helix into the E2E test server's go.mod.
        # The E2E test server has its own go.mod that may pin an older kodit;
        # go mod tidy in the Docker build will update go.sum automatically.
        KODIT_VERSION=$$(grep 'github.com/helixml/kodit' /drone/src/go.mod | awk '{print $$2}')
        if [ -n "$${KODIT_VERSION}" ]; then
          sed -i "s|github.com/helixml/kodit v[^ ]*|github.com/helixml/kodit $${KODIT_VERSION}|" \
            "$${E2E_DIR}/helix-ws-test-server/go.mod"
          echo "Synced kodit to $${KODIT_VERSION} in E2E test server go.mod"
        fi

        # Verify helix-api has expected structure (not nested from stale cp -r)
        if [ ! -d "$${E2E_DIR}/helix-api/pkg" ]; then
          echo "ERROR: helix-api structure is wrong — expected helix-api/pkg/ at top level"
          echo "Contents of helix-api/:"
          ls -la "$${E2E_DIR}/helix-api/" || true
          exit 1
        fi

        echo "Building E2E runtime image (multi-stage: Go builder + runtime)..."
        docker build -t zed-ws-e2e:$${ZED_COMMIT} \
          -f "$${E2E_DIR}/Dockerfile.ci" \
          "$${E2E_DIR}"

        # Clean up external files from cached Zed source
        # Use || true because stale files from previous builds on the shared
        # Docker volume cache may fail to remove (root-owned from docker build)
        rm -f "$${E2E_DIR}/zed-binary" "$${E2E_DIR}/helix-go.mod" "$${E2E_DIR}/helix-go.sum" || true
        rm -rf "$${E2E_DIR}/helix-api" || true

        # Run both agents in a single invocation (all 10 phases each).
        # Both zed-agent and claude rounds must pass to gate the build.
        # The cancel drop fix in acp_thread.rs ensures Phase 8 (mid-stream
        # interrupt) works with Claude Code despite agent-side cancel bugs.
        echo "Running E2E test: zed-agent + claude (all 10 phases each)..."
        docker run --rm \
          -e ANTHROPIC_API_KEY="$${ANTHROPIC_API_KEY}" \
          -e E2E_AGENTS="zed-agent,claude" \
          -e TEST_TIMEOUT=600 \
          zed-ws-e2e:$${ZED_COMMIT}

        echo "Zed WebSocket E2E test passed (both agents)"
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock
      - name: sandbox-build-cache
        path: /drone/src/cache
    depends_on:
      - build-zed

  # Step 4: Build and push desktop images to registry
  - name: build-desktops
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      REGISTRY_PASSWORD:
        from_secret: helix_registry_password
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        # Determine version tag
        if [ -n "${DRONE_TAG}" ]; then
          VERSION="${DRONE_TAG}"
        else
          VERSION=$$(echo ${DRONE_COMMIT_SHA} | head -c 7)
        fi
        echo "Building desktop images with version: $${VERSION}"
      - echo "$${REGISTRY_PASSWORD}" | docker login registry.helixml.tech -u admin --password-stdin
      # Build and push helix-sway
      - |
        VERSION=$$(if [ -n "${DRONE_TAG}" ]; then echo ${DRONE_TAG}; else echo ${DRONE_COMMIT_SHA} | head -c 7; fi)
        echo "Building helix-sway..."
        docker build --pull --provenance=false \
          -f Dockerfile.sway-helix \
          -t registry.helixml.tech/helix/helix-sway:$${VERSION}-linux-amd64 \
          .
        docker push registry.helixml.tech/helix/helix-sway:$${VERSION}-linux-amd64
        scripts/ghcr-push.sh registry.helixml.tech/helix/helix-sway:$${VERSION}-linux-amd64
        echo "helix-sway:$${VERSION}-linux-amd64 pushed to registry"
      # Build and push helix-ubuntu
      - |
        VERSION=$$(if [ -n "${DRONE_TAG}" ]; then echo ${DRONE_TAG}; else echo ${DRONE_COMMIT_SHA} | head -c 7; fi)
        echo "Building helix-ubuntu..."
        docker build --pull --provenance=false \
          -f Dockerfile.ubuntu-helix \
          --build-arg CUDA_BASE_IMAGE=nvidia/cuda:12.6.3-runtime-ubuntu24.04@sha256:2c8193530ecc423e0f123d0c85b68a15d1395adcddabfc943e2523dbfde172e1 \
          -t registry.helixml.tech/helix/helix-ubuntu:$${VERSION}-linux-amd64 \
          .
        docker push registry.helixml.tech/helix/helix-ubuntu:$${VERSION}-linux-amd64
        scripts/ghcr-push.sh registry.helixml.tech/helix/helix-ubuntu:$${VERSION}-linux-amd64
        echo "helix-ubuntu:$${VERSION}-linux-amd64 pushed to registry"
      # Write version refs for sandbox
      - |
        VERSION=$$(if [ -n "${DRONE_TAG}" ]; then echo ${DRONE_TAG}; else echo ${DRONE_COMMIT_SHA} | head -c 7; fi)
        mkdir -p sandbox-images
        echo "ghcr.io/helixml/helix-sway:$${VERSION}-linux-amd64" > sandbox-images/helix-sway.ref
        echo "ghcr.io/helixml/helix-ubuntu:$${VERSION}-linux-amd64" > sandbox-images/helix-ubuntu.ref
        echo "$${VERSION}-linux-amd64" > sandbox-images/helix-sway.version
        echo "$${VERSION}-linux-amd64" > sandbox-images/helix-ubuntu.version
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock
    depends_on:
      - build-qwen-code
      - build-zed

  # Step 5: Build sandbox image
  - name: build-sandbox
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    commands:
      - |
        # Determine version tag
        if [ -n "${DRONE_TAG}" ]; then
          VERSION="${DRONE_TAG}"
        else
          VERSION=$$(echo ${DRONE_COMMIT_SHA} | head -c 7)
        fi
        COMMIT=$$(echo ${DRONE_COMMIT_SHA} | head -c 7)
        echo "Building sandbox with version: $${VERSION}, commit: $${COMMIT}"
        docker build --pull -f Dockerfile.sandbox \
          -t helix-sandbox:$${VERSION}-linux-amd64 \
          -t registry.helixml.tech/helix/helix-sandbox:$${COMMIT}-linux-amd64 \
          -t registry.helixml.tech/helix/helix-sandbox:$${VERSION}-linux-amd64 \
          .
        echo "Sandbox image built successfully"
        docker images helix-sandbox
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock
    depends_on:
      - build-desktops

  # Step 6: Push to registry (gated on E2E test passing)
  - name: push-sandbox
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      REGISTRY_PASSWORD:
        from_secret: helix_registry_password
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        # Determine version tag
        if [ -n "${DRONE_TAG}" ]; then
          VERSION="${DRONE_TAG}"
          IS_RELEASE="true"
        else
          VERSION=$$(echo ${DRONE_COMMIT_SHA} | head -c 7)
          IS_RELEASE="false"
        fi
        COMMIT=$$(echo ${DRONE_COMMIT_SHA} | head -c 7)
        echo "Logging in to registry..."
        echo "$${REGISTRY_PASSWORD}" | docker login registry.helixml.tech -u admin --password-stdin
        echo "Pushing helix-sandbox:$${COMMIT}-linux-amd64..."
        docker push registry.helixml.tech/helix/helix-sandbox:$${COMMIT}-linux-amd64
        scripts/ghcr-push.sh registry.helixml.tech/helix/helix-sandbox:$${COMMIT}-linux-amd64
        if [ "$${IS_RELEASE}" = "true" ]; then
          echo "Pushing release tag: $${VERSION}-linux-amd64..."
          docker push registry.helixml.tech/helix/helix-sandbox:$${VERSION}-linux-amd64
          scripts/ghcr-push.sh registry.helixml.tech/helix/helix-sandbox:$${VERSION}-linux-amd64
        fi
        echo "Push complete!"
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock
    depends_on:
      - build-sandbox
      - zed-e2e-test

---
# ====================================================================
# ARM64 Sandbox Pipeline
# Mirrors build-sandbox-amd64 but runs on macOS Docker Desktop (flight)
# Key differences:
# - Uses docker:cli (not plugins/docker) for all steps
# - Volume host paths under /Volumes/Big/drone-cache/ (Docker Desktop VM mount)
# - DinD volume paths also use /Volumes/Big/drone-cache/
# - --provenance=false on all docker builds
# - --build-arg CUDA_BASE_IMAGE=ubuntu:25.10 for ubuntu-helix (no CUDA on ARM)
# - Skips zed-e2e-test (add later)
# ====================================================================
kind: pipeline
type: docker
name: build-sandbox-arm64

platform:
  os: linux
  arch: arm64

trigger:
  ref:
    include:
      - refs/heads/main
      - refs/tags/*

volumes:
  - name: dockersocket
    host:
      path: /var/run/docker.sock
  - name: sandbox-build-cache
    host:
      path: /Volumes/Big/drone-cache/sandbox-build

steps:
  # Step 1: Clone external repositories (same as amd64)
  - name: clone-dependencies
    image: alpine/git:latest
    commands:
      - mkdir -p /drone/src/external /drone/src/cache
      - |
        . /drone/src/sandbox-versions.txt
        echo "Pinned versions: ZED=$${ZED_COMMIT} QWEN=$${QWEN_COMMIT}"
        echo "$${ZED_COMMIT}" > /drone/src/zed-commit.txt
        echo "$${QWEN_COMMIT}" > /drone/src/qwen-code-commit.txt
      - |
        . /drone/src/sandbox-versions.txt
        ZED_HEAD=$$(git ls-remote https://github.com/helixml/zed.git HEAD | cut -f1)
        QWEN_HEAD=$$(git ls-remote https://github.com/helixml/qwen-code.git HEAD | cut -f1)
        if [ "$${ZED_COMMIT}" != "$${ZED_HEAD}" ]; then
          echo "⚠️  ZED_COMMIT is behind upstream HEAD ($${ZED_HEAD:0:12})"
        fi
        if [ "$${QWEN_COMMIT}" != "$${QWEN_HEAD}" ]; then
          echo "⚠️  QWEN_COMMIT is behind upstream HEAD ($${QWEN_HEAD:0:12})"
        fi
      - |
        . /drone/src/sandbox-versions.txt
        echo "Cloning Zed at commit $${ZED_COMMIT}..."
        cd /
        rm -rf /drone/src/cache/zed-source
        git init /drone/src/cache/zed-source
        git -C /drone/src/cache/zed-source fetch --depth 1 https://github.com/helixml/zed.git $${ZED_COMMIT}
        git -C /drone/src/cache/zed-source checkout FETCH_HEAD
        echo "✓ Zed source at $$(git -C /drone/src/cache/zed-source rev-parse HEAD)"
      - |
        . /drone/src/sandbox-versions.txt
        echo "Cloning qwen-code at commit $${QWEN_COMMIT}..."
        cd /
        rm -rf /drone/src/cache/qwen-source
        git init /drone/src/cache/qwen-source
        git -C /drone/src/cache/qwen-source fetch --depth 1 https://github.com/helixml/qwen-code.git $${QWEN_COMMIT}
        git -C /drone/src/cache/qwen-source checkout FETCH_HEAD
        echo "✓ qwen-code source at $$(git -C /drone/src/cache/qwen-source rev-parse HEAD)"
      - echo "=== Dependency versions ==="
      - echo "Zed:" && cat /drone/src/zed-commit.txt
      - echo "qwen-code:" && cat /drone/src/qwen-code-commit.txt
    volumes:
      - name: sandbox-build-cache
        path: /drone/src/cache

  # Step 2: Build qwen-code using Dockerfile.qwen-build with BuildKit cache.
  - name: build-qwen-code
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    commands:
      - |
        QWEN_SOURCE="/drone/src/cache/qwen-source"

        if [ ! -f "$${QWEN_SOURCE}/package.json" ]; then
          echo "ERROR: qwen-code source not found at $${QWEN_SOURCE}"
          exit 1
        fi

        echo "Building qwen-code from source..."
        mkdir -p qwen-code-build
        docker build \
          --provenance=false \
          --output type=local,dest=qwen-code-build \
          -f Dockerfile.qwen-build \
          "$${QWEN_SOURCE}"

        cat /drone/src/qwen-code-commit.txt > qwen-code-build/.git-commit-hash
        echo "qwen-code build complete"
        ls -la qwen-code-build/
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock
      - name: sandbox-build-cache
        path: /drone/src/cache
    depends_on:
      - clone-dependencies

  # Step 3: Build Zed binary (DinD with macOS Docker Desktop paths)
  # Builds Zed using the full Dockerfile.zed-build with BuildKit cache mounts.
  - name: build-zed
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    commands:
      - |
        ZED_SOURCE="/drone/src/cache/zed-source"

        if [ ! -f "$${ZED_SOURCE}/Cargo.toml" ]; then
          echo "ERROR: Zed source not found at $${ZED_SOURCE}"
          exit 1
        fi

        ZED_SHA=$$(git -C "$${ZED_SOURCE}" rev-parse HEAD)
        if [ -z "$${ZED_SHA}" ]; then
          echo "ERROR: Could not determine Zed source commit"
          exit 1
        fi

        CACHE_DIR="/drone/src/cache/zed-bin-$${ZED_SHA}"
        if [ -f "$${CACHE_DIR}/zed" ]; then
          echo "✓ Using cached Zed binary for $${ZED_SHA}"
          mkdir -p zed-build
          cp "$${CACHE_DIR}/zed" zed-build/zed
          cp "$${CACHE_DIR}/app-icon.png" zed-build/app-icon.png
          chmod +x zed-build/zed
        else
          echo "Building Zed from source commit: $${ZED_SHA}"
          mkdir -p zed-build
          docker build \
            --provenance=false \
            --build-arg BUILD_TYPE=release \
            --build-arg ZED_COMMIT_SHA=$${ZED_SHA} \
            --output type=local,dest=zed-build \
            -f Dockerfile.zed-build \
            "$${ZED_SOURCE}"

          cp "$${ZED_SOURCE}/crates/zed/resources/app-icon.png" zed-build/app-icon.png
          chmod +x zed-build/zed

          mkdir -p "$${CACHE_DIR}"
          cp zed-build/zed "$${CACHE_DIR}/zed"
          cp zed-build/app-icon.png "$${CACHE_DIR}/app-icon.png"
          echo "✓ Cached Zed binary at $${CACHE_DIR}"
        fi
        ls -la zed-build/
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock
      - name: sandbox-build-cache
        path: /drone/src/cache
    depends_on:
      - clone-dependencies

  # Step 4: Build and push desktop images (arm64, with CUDA_BASE_IMAGE override)
  - name: build-desktops
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      REGISTRY_PASSWORD:
        from_secret: helix_registry_password
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        if [ -n "${DRONE_TAG}" ]; then
          VERSION="${DRONE_TAG}"
        else
          VERSION=$$(echo ${DRONE_COMMIT_SHA} | head -c 7)
        fi
        echo "Building ARM64 desktop images with version: $${VERSION}"
      - echo "$${REGISTRY_PASSWORD}" | docker login registry.helixml.tech -u admin --password-stdin
      # Build and push helix-sway (arm64)
      - |
        VERSION=$$(if [ -n "${DRONE_TAG}" ]; then echo ${DRONE_TAG}; else echo ${DRONE_COMMIT_SHA} | head -c 7; fi)
        echo "Building helix-sway (arm64)..."
        docker build --pull --provenance=false \
          -f Dockerfile.sway-helix \
          -t registry.helixml.tech/helix/helix-sway:$${VERSION}-linux-arm64 \
          .
        docker push registry.helixml.tech/helix/helix-sway:$${VERSION}-linux-arm64
        scripts/ghcr-push.sh registry.helixml.tech/helix/helix-sway:$${VERSION}-linux-arm64
        echo "helix-sway:$${VERSION}-linux-arm64 pushed to registry"
      # Build and push helix-ubuntu (arm64, no CUDA)
      - |
        VERSION=$$(if [ -n "${DRONE_TAG}" ]; then echo ${DRONE_TAG}; else echo ${DRONE_COMMIT_SHA} | head -c 7; fi)
        echo "Building helix-ubuntu (arm64, no CUDA)..."
        docker build --pull --provenance=false \
          -f Dockerfile.ubuntu-helix \
          --build-arg CUDA_BASE_IMAGE=ubuntu:25.10@sha256:91e7ac4c041dd191af1b9012fadbf489280894699c3f31e180969c4478781b7b \
          -t registry.helixml.tech/helix/helix-ubuntu:$${VERSION}-linux-arm64 \
          .
        docker push registry.helixml.tech/helix/helix-ubuntu:$${VERSION}-linux-arm64
        scripts/ghcr-push.sh registry.helixml.tech/helix/helix-ubuntu:$${VERSION}-linux-arm64
        echo "helix-ubuntu:$${VERSION}-linux-arm64 pushed to registry"
      # Write version refs for sandbox
      - |
        VERSION=$$(if [ -n "${DRONE_TAG}" ]; then echo ${DRONE_TAG}; else echo ${DRONE_COMMIT_SHA} | head -c 7; fi)
        mkdir -p sandbox-images
        echo "ghcr.io/helixml/helix-sway:$${VERSION}-linux-arm64" > sandbox-images/helix-sway.ref
        echo "ghcr.io/helixml/helix-ubuntu:$${VERSION}-linux-arm64" > sandbox-images/helix-ubuntu.ref
        echo "$${VERSION}-linux-arm64" > sandbox-images/helix-sway.version
        echo "$${VERSION}-linux-arm64" > sandbox-images/helix-ubuntu.version
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock
    depends_on:
      - build-qwen-code
      - build-zed

  # Step 5: Build sandbox image (arm64)
  - name: build-sandbox
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    commands:
      - |
        if [ -n "${DRONE_TAG}" ]; then
          VERSION="${DRONE_TAG}"
        else
          VERSION=$$(echo ${DRONE_COMMIT_SHA} | head -c 7)
        fi
        COMMIT=$$(echo ${DRONE_COMMIT_SHA} | head -c 7)
        echo "Building ARM64 sandbox with version: $${VERSION}, commit: $${COMMIT}"
        docker build --pull --provenance=false -f Dockerfile.sandbox \
          -t helix-sandbox:$${VERSION}-linux-arm64 \
          -t registry.helixml.tech/helix/helix-sandbox:$${COMMIT}-linux-arm64 \
          -t registry.helixml.tech/helix/helix-sandbox:$${VERSION}-linux-arm64 \
          .
        echo "ARM64 sandbox image built successfully"
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock
    depends_on:
      - build-desktops

  # Step 6: Push to registry (arm64)
  - name: push-sandbox
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      REGISTRY_PASSWORD:
        from_secret: helix_registry_password
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        if [ -n "${DRONE_TAG}" ]; then
          VERSION="${DRONE_TAG}"
          IS_RELEASE="true"
        else
          VERSION=$$(echo ${DRONE_COMMIT_SHA} | head -c 7)
          IS_RELEASE="false"
        fi
        COMMIT=$$(echo ${DRONE_COMMIT_SHA} | head -c 7)
        echo "Logging in to registry..."
        echo "$${REGISTRY_PASSWORD}" | docker login registry.helixml.tech -u admin --password-stdin
        echo "Pushing helix-sandbox:$${COMMIT}-linux-arm64..."
        docker push registry.helixml.tech/helix/helix-sandbox:$${COMMIT}-linux-arm64
        scripts/ghcr-push.sh registry.helixml.tech/helix/helix-sandbox:$${COMMIT}-linux-arm64
        if [ "$${IS_RELEASE}" = "true" ]; then
          echo "Pushing release tag: $${VERSION}-linux-arm64..."
          docker push registry.helixml.tech/helix/helix-sandbox:$${VERSION}-linux-arm64
          scripts/ghcr-push.sh registry.helixml.tech/helix/helix-sandbox:$${VERSION}-linux-arm64
        fi
        echo "ARM64 push complete!"
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock
    depends_on:
      - build-sandbox

---
# ====================================================================
# Multi-arch manifest pipelines for sandbox and desktop images
# ====================================================================
kind: pipeline
type: docker
name: manifest-sandbox

depends_on:
  - build-sandbox-amd64
  - build-sandbox-arm64

trigger:
  ref:
    include:
      - refs/heads/main
      - refs/tags/*

volumes:
  - name: dockersocket
    host:
      path: /var/run/docker.sock

steps:
  - name: manifest-helix-sandbox
    image: docker:cli
    environment:
      REGISTRY_PASSWORD:
        from_secret: helix_registry_password
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - echo "$${REGISTRY_PASSWORD}" | docker login registry.helixml.tech -u admin --password-stdin
      - |
        if [ -n "${DRONE_TAG}" ]; then
          VERSION="${DRONE_TAG}"
        else
          VERSION=$$(echo ${DRONE_COMMIT_SHA} | head -c 7)
        fi
        REPO="registry.helixml.tech/helix/helix-sandbox"
        echo "Creating multi-arch manifest for $${REPO}:$${VERSION}"
        docker manifest create --amend $${REPO}:$${VERSION} \
          $${REPO}:$${VERSION}-linux-amd64 \
          $${REPO}:$${VERSION}-linux-arm64
        docker manifest push $${REPO}:$${VERSION}
        echo "Multi-arch manifest pushed: $${REPO}:$${VERSION}"
        scripts/ghcr-manifest.sh $${REPO} $${VERSION}
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock

  - name: manifest-helix-sway
    image: docker:cli
    environment:
      REGISTRY_PASSWORD:
        from_secret: helix_registry_password
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - echo "$${REGISTRY_PASSWORD}" | docker login registry.helixml.tech -u admin --password-stdin
      - |
        if [ -n "${DRONE_TAG}" ]; then
          VERSION="${DRONE_TAG}"
        else
          VERSION=$$(echo ${DRONE_COMMIT_SHA} | head -c 7)
        fi
        REPO="registry.helixml.tech/helix/helix-sway"
        echo "Creating multi-arch manifest for $${REPO}:$${VERSION}"
        docker manifest create --amend $${REPO}:$${VERSION} \
          $${REPO}:$${VERSION}-linux-amd64 \
          $${REPO}:$${VERSION}-linux-arm64
        docker manifest push $${REPO}:$${VERSION}
        echo "Multi-arch manifest pushed: $${REPO}:$${VERSION}"
        scripts/ghcr-manifest.sh $${REPO} $${VERSION}
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock

  - name: manifest-helix-ubuntu
    image: docker:cli
    environment:
      REGISTRY_PASSWORD:
        from_secret: helix_registry_password
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - echo "$${REGISTRY_PASSWORD}" | docker login registry.helixml.tech -u admin --password-stdin
      - |
        if [ -n "${DRONE_TAG}" ]; then
          VERSION="${DRONE_TAG}"
        else
          VERSION=$$(echo ${DRONE_COMMIT_SHA} | head -c 7)
        fi
        REPO="registry.helixml.tech/helix/helix-ubuntu"
        echo "Creating multi-arch manifest for $${REPO}:$${VERSION}"
        docker manifest create --amend $${REPO}:$${VERSION} \
          $${REPO}:$${VERSION}-linux-amd64 \
          $${REPO}:$${VERSION}-linux-arm64
        docker manifest push $${REPO}:$${VERSION}
        echo "Multi-arch manifest pushed: $${REPO}:$${VERSION}"
        scripts/ghcr-manifest.sh $${REPO} $${VERSION}
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock


# ====================================================================
# macOS DMG Build Pipeline
# Builds Helix.app, signs with Developer ID, creates DMG, notarizes,
# and uploads to Cloudflare R2.
# Runs on flight-arm64 (native macOS exec, not Docker).
# ====================================================================
---
kind: pipeline
type: exec
name: build-macos-dmg

platform:
  os: darwin
  arch: arm64

# Wait for ARM64 Docker images and release artifacts before provisioning the VM
depends_on:
  - default
  - build-controlplane-arm64
  - build-haystack-arm64
  - build-typesense-arm64
  - build-sandbox-arm64

trigger:
  ref:
    include:
      - refs/tags/*

steps:
  # Step 1: Provision VM image and upload to R2
  # Boots a QEMU VM, installs Helix using pre-built ARM64 Docker images,
  # compresses the disk with zstd, and uploads to R2 CDN.
  # This updates vm-manifest.json in the working tree for build-app to embed.
  - name: provision-vm
    environment:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:/Users/luke/go/bin
      R2_ACCESS_KEY_ID:
        from_secret: r2_access_key_id
      R2_SECRET_ACCESS_KEY:
        from_secret: r2_secret_access_key
      R2_ENDPOINT: https://f0150e619c6dc08f55aea6d2248b1c6c.r2.cloudflarestorage.com
      R2_BUCKET: helix-desktop
    commands:
      - export HOME=/Users/luke
      # Fail fast if R2 credentials are missing
      - |
        if [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ]; then
          echo "ERROR: R2 credentials not set. Check Drone secrets r2_access_key_id and r2_secret_access_key."
          exit 1
        fi
        echo "R2 credentials verified (endpoint: $R2_ENDPOINT)"
      # Run provisioning with upload
      # Uses /Volumes/Big for VM disk (fast SSD on the runner)
      - |
        if [ -n "$DRONE_TAG" ]; then PROV_VERSION="$DRONE_TAG"; else PROV_VERSION=$(echo $DRONE_COMMIT_SHA | head -c 9); fi
        cd for-mac
        HELIX_VM_DIR=/Volumes/Big/helix-vm/ci-provision \
        VM_VERSION="$PROV_VERSION" \
        bash scripts/provision-vm-light.sh \
          --helix-version "$PROV_VERSION" \
          --upload
      # Clean up VM disk (no longer needed after upload to R2)
      - rm -rf /Volumes/Big/helix-vm/ci-provision

  # Step 2: Build Helix.app with embedded QEMU, frameworks, and vm-manifest.json
  - name: build-app
    environment:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:/Users/luke/go/bin
      KEYCHAIN_PASSWORD:
        from_secret: keychain_password
      APPLE_SIGNING_IDENTITY:
        from_secret: apple_signing_identity
    commands:
      - export HOME=/Users/luke
      # Unlock CI keychain for codesign access to Developer ID cert
      - security unlock-keychain -p "$KEYCHAIN_PASSWORD" /Users/luke/Library/Keychains/Helix-Dev.keychain-db
      - security list-keychains -d user -s /Users/luke/Library/Keychains/Helix-Dev.keychain-db /Users/luke/Library/Keychains/login.keychain-db
      # Create .env.signing so build scripts use Developer ID instead of ad-hoc
      - echo "APPLE_SIGNING_IDENTITY='$APPLE_SIGNING_IDENTITY'" > for-mac/.env.signing
      - cd for-mac
      - ./scripts/build-helix-app.sh

  # Step 3: Create DMG, sign, notarize, upload to R2
  - name: create-dmg
    environment:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:/Users/luke/go/bin
      KEYCHAIN_PASSWORD:
        from_secret: keychain_password
      APPLE_SIGNING_IDENTITY:
        from_secret: apple_signing_identity
      R2_ACCESS_KEY_ID:
        from_secret: r2_access_key_id
      R2_SECRET_ACCESS_KEY:
        from_secret: r2_secret_access_key
    commands:
      - export HOME=/Users/luke
      # Unlock CI keychain
      - security unlock-keychain -p "$KEYCHAIN_PASSWORD" /Users/luke/Library/Keychains/Helix-Dev.keychain-db
      - security list-keychains -d user -s /Users/luke/Library/Keychains/Helix-Dev.keychain-db /Users/luke/Library/Keychains/login.keychain-db
      # Create .env.signing for create-dmg's signing step
      - echo "APPLE_SIGNING_IDENTITY='$APPLE_SIGNING_IDENTITY'" > for-mac/.env.signing
      - cd for-mac
      # Build DMG (no upload yet — notarize first)
      - |
        if [ -n "$DRONE_TAG" ]; then DMG_VER="$DRONE_TAG"; else DMG_VER=$(echo $DRONE_COMMIT_SHA | head -c 7); fi
        ./scripts/create-dmg.sh --skip-styling --version "$DMG_VER"
      # Notarize with Helix-Dev keychain, then staple ticket into DMG
      - |
        xcrun notarytool submit build/bin/Helix-for-Mac.dmg \
          --keychain-profile "helix-notarize" \
          --keychain /Users/luke/Library/Keychains/Helix-Dev.keychain-db \
          --wait
      - xcrun stapler staple build/bin/Helix-for-Mac.dmg
      # Upload notarized+stapled DMG to R2
      - |
        export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
        export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
        if [ -n "$DRONE_TAG" ]; then DMG_VERSION="$DRONE_TAG"; else DMG_VERSION=$(echo $DRONE_COMMIT_SHA | head -c 7); fi
        echo "Uploading DMG for version: $DMG_VERSION"
        aws s3 cp build/bin/Helix-for-Mac.dmg \
          "s3://helix-desktop/desktop/$DMG_VERSION/Helix-for-Mac.dmg" \
          --endpoint-url "https://f0150e619c6dc08f55aea6d2248b1c6c.r2.cloudflarestorage.com" \
          --no-progress
      # Upload latest.json pointer for update checking
      - |
        if [ -n "${DRONE_TAG}" ]; then
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          echo "{\"version\":\"${DRONE_TAG}\",\"dmg_url\":\"https://dl.helix.ml/desktop/${DRONE_TAG}/Helix-for-Mac.dmg\",\"vm_url\":\"https://dl.helix.ml/vm/${DRONE_TAG}/disk.qcow2.zst\"}" | \
            aws s3 cp - "s3://helix-desktop/desktop/latest.json" \
              --endpoint-url "https://f0150e619c6dc08f55aea6d2248b1c6c.r2.cloudflarestorage.com" \
              --content-type "application/json" \
              --no-progress
        fi

---
# ====================================================================
# Release Rollback Pipeline
# ====================================================================
# Runs ONLY on tag events when any release pipeline fails.
# Cleans up partially-published user-visible artifacts:
#   - GitHub release and uploaded assets
#   - Remote git tag
#   - Helm chart packages from GCS bucket
#   - macOS DMG and VM disk from R2/Cloudflare
#   - latest.json pointer (reverted to previous good release)
#
# Docker images are NOT cleaned up (harmless — nobody pulls a failed
# version tag unless explicitly referencing it).
#
# Can also be run manually: scripts/release-rollback.sh VERSION
# ====================================================================
kind: pipeline
type: docker
name: release-rollback

depends_on:
  - default
  - build-controlplane-amd64
  - build-controlplane-arm64
  - manifest-controlplane
  - build-haystack-amd64
  - build-haystack-arm64
  - manifest-haystack
  - build-runner
  - build-runner-small
  - build-runner-large
  - build-typesense-amd64
  - build-typesense-arm64
  - manifest-typesense
  - build-demos
  - build-sandbox-amd64
  - build-sandbox-arm64
  - manifest-sandbox
  - build-macos-dmg

trigger:
  ref:
    include:
      - refs/tags/*
  status:
    - failure

steps:
  - name: rollback-release
    image: google/cloud-sdk:slim
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
      R2_ACCESS_KEY_ID:
        from_secret: r2_access_key_id
      R2_SECRET_ACCESS_KEY:
        from_secret: r2_secret_access_key
      GCS_SERVICE_ACCOUNT_KEY:
        from_secret: gcs_service_account_key
      SLACK_WEBHOOK_URL:
        from_secret: JANITOR_SLACK_WEBHOOK_URL
    commands:
      - apt-get update -qq && apt-get install -y -qq curl jq > /dev/null
      # Install gh CLI
      - curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg 2>/dev/null
      - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
      - apt-get update -qq && apt-get install -y -qq gh > /dev/null
      # Install helm
      - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash > /dev/null 2>&1
      # Install awscli
      - pip3 install -q awscli 2>/dev/null
      # Run rollback
      - scripts/release-rollback.sh "$DRONE_TAG"
