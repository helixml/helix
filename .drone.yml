# Helm Upgrade Compatibility Test
# Catches backwards-incompatible Helm chart changes before they reach customers.
# Installs the previous published chart version then upgrades to the latest.
# Run locally: ./scripts/helm-upgrade-test.sh
kind: pipeline
type: docker
name: helm-upgrade-test

concurrency:
  limit: 1

platform:
  os: linux
  arch: amd64

trigger:
  event:
    - cron
  cron:
    - helm-upgrade-nightly
    - developer

steps:
  - name: helm-upgrade-test
    image: docker:27-cli
    volumes:
      - name: dockersocket
        path: /var/run/docker.sock
    commands:
      # Install tools
      - apk add --no-cache bash curl git helm kubectl jq
      # Install kind
      - curl -Lo /usr/local/bin/kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
      - chmod +x /usr/local/bin/kind
      # Verify Docker is accessible via host socket
      - docker info >/dev/null 2>&1 || (echo "Cannot access Docker socket" && exit 1)
      # Pre-flight cleanup: remove any orphaned Kind containers from previous failed runs
      - docker rm -f helm-upgrade-test-control-plane 2>/dev/null || true
      # Run upgrade test
      - bash scripts/helm-upgrade-test.sh
    depends_on: []

  - name: slack-notification
    image: plugins/slack
    settings:
      webhook:
        from_secret: JANITOR_SLACK_WEBHOOK_URL
      channel: helix-janitor
      message: "❌ Helm upgrade test failed — possible breaking chart change. (<https://drone.lukemarsden.net/helixml/helix/${DRONE_BUILD_NUMBER}|Build>)"
    when:
      status:
        - failure

volumes:
  - name: dockersocket
    host:
      path: /var/run/docker.sock

