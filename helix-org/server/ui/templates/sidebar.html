<aside class="hidden lg:flex w-[240px] shrink-0 flex-col border-r" style="background: var(--surface); border-color: var(--line);">
    <div class="px-4 pt-4 pb-3">
        <a href="/ui/" class="flex items-center gap-2 group">
            <span class="grid place-items-center" style="color: var(--accent);">
                <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                    <path d="M5 4 C 14 8, 10 16, 19 20" />
                    <path d="M19 4 C 10 8, 14 16, 5 20" />
                    <path d="M7.5 7 L 16.5 7" stroke-width="1" opacity=".55" />
                    <path d="M7.5 17 L 16.5 17" stroke-width="1" opacity=".55" />
                </svg>
            </span>
            <span class="font-display text-[18px] tracking-tight" style="color: var(--ink);">helix<span style="color: var(--accent);">·</span>org</span>
        </a>
    </div>

    <nav class="px-3 pt-1 flex flex-col gap-[2px]">
        <a href="/ui/" class="nav-link" hx-post="/ui/chat/new" hx-swap="none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>
            New chat
        </a>
        <a href="/ui/" class="nav-link {{ if eq .Active "chat" }}is-active{{ end }}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Chats
        </a>
        <a href="/ui/org" class="nav-link {{ if eq .Active "org" }}is-active{{ end }}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="5" r="2.2"/><circle cx="5" cy="19" r="2.2"/><circle cx="19" cy="19" r="2.2"/><path d="M12 7v4 M5 17v-2 a2 2 0 0 1 2-2 h10 a2 2 0 0 1 2 2 v2"/></svg>
            Org
        </a>
        <a href="/ui/streams" class="nav-link {{ if eq .Active "streams" }}is-active{{ end }}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18 M3 12h12 M3 18h18"/></svg>
            Streams
        </a>
        <a href="/ui/settings" class="nav-link {{ if eq .Active "settings" }}is-active{{ end }}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Settings
        </a>
    </nav>

    <div class="flex-1"></div>

    <div class="border-t px-3 py-3 flex items-center gap-2" style="border-color: var(--line);">
        <span class="grid place-items-center w-7 h-7 rounded-full font-display text-[13px] font-medium" style="background: var(--accent); color: var(--accent-on);">{{ .Initial }}</span>
        <div class="flex-1 min-w-0">
            <div class="text-[13px] font-medium truncate" style="color: var(--ink);">{{ .DisplayName }}</div>
            <div class="text-[11px] font-mono truncate" style="color: var(--ink-muted);">{{ .WorkerID }}</div>
        </div>
    </div>
</aside>
