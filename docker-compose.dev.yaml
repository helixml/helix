services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-dev-env
    networks:
      - default
    ports:
      - ${API_PORT:-8080}:8080
      # Port range for expose endpoint (port-based proxy for dev container services)
      - "30000-30100:30000-30100"
    restart: always
    env_file:
      - .env
    environment:
      - SERVER_PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - POSTGRES_HOST=postgres
      - POSTGRES_DATABASE=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_ADMIN_PASSWORD-postgres}
      - RUNNER_TOKEN=${RUNNER_TOKEN-oh-hallo-insecure-token}
      # Encryption key for secrets at rest (SSH keys, PATs, etc.)
      - HELIX_ENCRYPTION_KEY=${HELIX_ENCRYPTION_KEY:-dev-encryption-key-do-not-use-in-prod}
      - SERVER_URL=${SERVER_URL:-http://localhost:8080}
      - JANITOR_SLACK_WEBHOOK_URL=${JANITOR_SLACK_WEBHOOK_URL:-}
      - JANITOR_SLACK_IGNORE_USERS=${JANITOR_SLACK_IGNORE_USERS:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_VERTEX_PROJECT_ID=${ANTHROPIC_VERTEX_PROJECT_ID:-}
      - ANTHROPIC_VERTEX_REGION=${ANTHROPIC_VERTEX_REGION:-}
      - ANTHROPIC_VERTEX_CREDENTIALS_JSON=${ANTHROPIC_VERTEX_CREDENTIALS_JSON:-}
      - ANTHROPIC_VERTEX_CREDENTIALS_FILE=${ANTHROPIC_VERTEX_CREDENTIALS_FILE:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SIGNING_SECRET=${STRIPE_WEBHOOK_SIGNING_SECRET:-}
      - STRIPE_PRICE_LOOKUP_KEY=${STRIPE_PRICE_LOOKUP_KEY:-}
      # lock down dashboard in production
      - ADMIN_USER_IDS=${ADMIN_USER_IDS-all}
      - EVAL_USER_ID=${EVAL_USER_ID:-}
      - FILESTORE_LOCALFS_PATH=/filestore
      - SENTRY_DSN_API=${SENTRY_DSN_API:-}
      - SENTRY_DSN_FRONTEND=${SENTRY_DSN_FRONTEND:-}
      - GOOGLE_ANALYTICS_FRONTEND=${GOOGLE_ANALYTICS_FRONTEND:-}
      # Tools configuration
      - TOOLS_ENABLED=true
      - TOOLS_PROVIDER=${TOOLS_PROVIDER:-helix}
      - TOOLS_MODEL=${TOOLS_MODEL:-llama3:instruct}
      # Email notifications
      - EMAIL_MAILGUN_DOMAIN=${EMAIL_MAILGUN_DOMAIN:-}
      - EMAIL_MAILGUN_API_KEY=${EMAIL_MAILGUN_API_KEY:-}
      # SMTP
      - EMAIL_SMTP_HOST=${EMAIL_SMTP_HOST:-}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT:-}
      - EMAIL_SMTP_USERNAME=${EMAIL_SMTP_USERNAME:-}
      - EMAIL_SMTP_PASSWORD=${EMAIL_SMTP_PASSWORD:-}
      # Discord integration
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - ADMIN_USER_SOURCE=${ADMIN_USER_SOURCE:-}
      - HELIX_EMBEDDINGS_SOCKET=/socket/embeddings.sock
      # Dynamic providers: format is "provider1:api_key1:base_url1,provider2:api_key2:base_url2"
      - DYNAMIC_PROVIDERS=${DYNAMIC_PROVIDERS:-}
      # Sandbox integration for external agents
      - EXTERNAL_AGENTS_MAX_CONCURRENT_LOBBIES=${EXTERNAL_AGENTS_MAX_CONCURRENT_LOBBIES:-10}
      - ZED_IMAGE=${ZED_IMAGE:-helix-sway:latest}
      # API URL for sandbox containers to connect back (RevDial, etc.)
      - SANDBOX_API_URL=http://api:8080
      - HELIX_HOST_HOME=${HELIX_HOST_HOME}
      - HELIX_DEV_MODE=true # Enable dev file bind-mounts for hot-reloading
      # Hydra multi-Docker isolation (per-scope dockerd for each agent session)
      - HYDRA_ENABLED=${HYDRA_ENABLED:-true}
      # Kodit code intelligence (in-process library)
      - KODIT_ENABLED=${KODIT_ENABLED:-false}
      - KODIT_DB_URL=postgresql://postgres:${PGVECTOR_PASSWORD-postgres}@vectorchord-kodit:5432/kodit
      - KODIT_MODEL_DIR=/kodit-models
      - KODIT_LLM_BASE_URL=http://localhost:8080/v1
      - KODIT_LLM_API_KEY=${RUNNER_TOKEN-oh-hallo-insecure-token}
      # Kodit embedding providers proxied through Helix's /v1/embeddings endpoint.
      # When set, kodit sends requests with placeholder model names "kodit-text-embedding" /
      # "kodit-vision-embedding" which Helix substitutes with the real provider/model
      # configured in Admin > System Settings.
      - KODIT_TEXT_EMBEDDING_BASE_URL=${KODIT_TEXT_EMBEDDING_BASE_URL-http://localhost:8080/v1}
      - KODIT_TEXT_EMBEDDING_API_KEY=${KODIT_TEXT_EMBEDDING_API_KEY-${RUNNER_TOKEN-oh-hallo-insecure-token}}
      - KODIT_TEXT_EMBEDDING_MODEL=${KODIT_TEXT_EMBEDDING_MODEL-kodit-text-embedding}
      - KODIT_VISION_EMBEDDING_BASE_URL=${KODIT_VISION_EMBEDDING_BASE_URL-http://localhost:8080/v1}
      - KODIT_VISION_EMBEDDING_API_KEY=${KODIT_VISION_EMBEDDING_API_KEY-${RUNNER_TOKEN-oh-hallo-insecure-token}}
      - KODIT_VISION_EMBEDDING_MODEL=${KODIT_VISION_EMBEDDING_MODEL-kodit-vision-embedding}
      # which desktop image to use for code agents
      - HELIX_DESKTOP=${HELIX_DESKTOP:-sway}
    volumes:
      - ./go.mod:/app/go.mod
      - ./go.sum:/app/go.sum
      - ./api:/app/api
      - ./WORKDIR_README.md:/opt/helix/WORKDIR_README.md:ro
      - ${FILESTORE_DATA:-helix-filestore}:/filestore
      - helix-socket:/socket
      # Go caches for faster air rebuilds (shared with runner config)
      - go-pkg-mod:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      # Production frontend build (used when FRONTEND_URL=/www)
      - ./frontend/dist:/www:ro
    depends_on:
      - postgres
      - postgres-mcp
      - chrome
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # In Helix-in-Helix mode, the startup script sets OUTER_API_IP to the
      # outer Helix API's address. This lets the inner API reach the outer API
      # at http://outer-api:8080 for LLM inference routing.
      - "outer-api:${OUTER_API_IP:-127.0.0.1}"
  postgres:
    image: postgres:12.13-alpine
    restart: always
    ports:
      - 127.0.0.1:5432:5432
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c max_connections=200
      -c max_worker_processes=2
      -c maintenance_work_mem=32MB
      -c effective_cache_size=256MB
    volumes:
      - ${POSTGRES_DATA:-helix-postgres-db}:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_ADMIN_PASSWORD-postgres}

  # Local Docker registry for efficient desktop image transfers (development only)
  # Instead of `docker save | docker load` which transfers entire tarballs,
  # registry push/pull only transfers changed layers (like CI builds).
  # This dramatically speeds up iterative development when only a few layers change.
  # The sandbox's dockerd is configured to trust host.docker.internal:5000
  registry:
    image: registry:2
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Enable manifest deletion for garbage collection
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry

  # Example/test MCP server
  postgres-mcp:
    image: crystaldba/postgres-mcp:latest
    restart: always
    command: ["--access-mode=unrestricted", "--transport=sse"]
    environment:
      - DATABASE_URI=postgresql://postgres:${POSTGRES_ADMIN_PASSWORD-postgres}@postgres:5432/postgres
    ports:
      - 8000:8000

  # Kodit PostgreSQL database with VectorChord (kodit library connects to this directly)
  vectorchord-kodit:
    image: tensorchord/vchord-suite:pg17-20250601
    restart: always
    command: >
      postgres
      -c shared_preload_libraries=vchord,vchord_bm25,vector,pg_tokenizer
      -c shared_buffers=32MB
      -c work_mem=2MB
      -c max_connections=50
      -c max_worker_processes=2
      -c maintenance_work_mem=32MB
      -c effective_cache_size=256MB
    environment:
      - POSTGRES_DB=kodit
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${PGVECTOR_PASSWORD-postgres}
    volumes:
      - ${VECTORCHORD_KODIT_DATA:-helix-vectorchord-kodit}:/var/lib/postgresql/data
    # ports:
    #   - 5434:5432
  webhook_relay_stripe:
    image: webhookrelay/webhookrelayd
    environment:
      - KEY=${WEBHOOK_RELAY_KEY:-}
      - SECRET=${WEBHOOK_RELAY_SECRET:-}
      - BUCKET=${WEBHOOK_RELAY_BUCKET:-}
  searxng:
    image: searxng/searxng:latest
    # ports:
    #   - 8112:8080
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml
      - ./searxng/limiter.toml:/etc/searxng/limiter.toml
    environment:
      - BASE_URL=http://searxng:8080
      - INSTANCE_NAME=helix-instance
      - UWSGI_WORKERS=4
      - UWSGI_THREADS=4
  chrome:
    image: ghcr.io/go-rod/rod:v0.115.0
    restart: always
    volumes:
      - ./integration-test/data/smoke:/integration-test/data/smoke
    # ports:
    #   - 7317:7317

  # Unified Helix Sandbox - Docker-in-Docker with direct WebSocket video streaming
  # Desktop containers stream video directly via WebSocket (no Wolf/Moonlight)
  # Built with: ./stack build-sandbox
  # Or use pre-built: SANDBOX_IMAGE=ghcr.io/helixml/helix-sandbox:latest ./stack up
  # NOTE: For Helix-in-Helix development, set HYDRA_PRIVILEGED_MODE_ENABLED=true
  sandbox-nvidia:
    profiles: [code-nvidia] # NVIDIA GPU sandbox
    image: ${SANDBOX_IMAGE:-helix-sandbox:latest}
    networks:
      - default
    environment:
      # GPU configuration
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_VISIBLE_DEVICES=all
      - GPU_VENDOR=${GPU_VENDOR:-nvidia}
      # Docker nesting depth for address pool isolation (incremented at each level)
      - HELIX_DOCKER_DEPTH=${HELIX_DOCKER_DEPTH:-1}
      # Helix dev mode (enables bind-mounts for hot reload)
      - HELIX_DEV_MODE=true
      - ZED_IMAGE=helix-sway:latest
      # Debug: keep dead desktop containers for inspection (default: false = auto-remove)
      - HELIX_KEEP_DEAD_CONTAINERS=${HELIX_KEEP_DEAD_CONTAINERS:-false}
      # Pre-pull experimental desktop images at startup (space-separated, e.g. "sway zorin").
      # Default empty: only production desktops (helix-ubuntu) are pulled on upgrade.
      - HELIX_EXPERIMENTAL_DESKTOPS=${HELIX_EXPERIMENTAL_DESKTOPS:-}
      # Sandbox data path for workspaces (must match volume mount)
      - SANDBOX_DATA_PATH=/data
      # Container Docker path for ZFS-backed inner dockerd (macOS desktop app)
      - CONTAINER_DOCKER_PATH=${CONTAINER_DOCKER_PATH:-}
      # RevDial configuration (connect sandbox to API)
      - HELIX_API_URL=http://api:8080
      - HELIX_API_BASE_URL=http://api:8080
      - SANDBOX_INSTANCE_ID=local
      - RUNNER_TOKEN=${RUNNER_TOKEN-oh-hallo-insecure-token}
      # Hydra multi-Docker isolation (per-scope dockerd for each agent session)
      - HYDRA_ENABLED=${HYDRA_ENABLED:-true}
      - HYDRA_PRIVILEGED_MODE_ENABLED=${HYDRA_PRIVILEGED_MODE_ENABLED:-true}
      # Runtime configuration
      - XDG_RUNTIME_DIR=/tmp/sockets
      - GST_DEBUG=3
      - GOP_SIZE=${GOP_SIZE:-240}
      - HELIX_HOSTNAME=${HELIX_HOSTNAME:-localhost}
    privileged: true # Required for Docker-in-Docker
    volumes:
      # Desktop configuration and state
      - ./desktop/:/etc/helix/desktop/:rw
      # Config template - bind-mounted for faster iteration (no rebuild needed)
      - ./desktop/config.toml.template:/opt/desktop-defaults/config.toml.template:ro
      - /tmp/sockets:/tmp/sockets:rw
      - ${SANDBOX_DOCKER_STORAGE:-sandbox-docker-storage}:/var/lib/docker
      # Container Docker path for per-session inner dockerd (ZFS on macOS, named volume on Linux)
      - ${CONTAINER_DOCKER_PATH:-sandbox-container-docker}:/container-docker
      # Hydra data dir — shared BuildKit cache for cross-session build caching
      - hydra-data:/hydra-data
      - /dev/:/dev/:rw
      - /run/udev:/run/udev:rw
      - /var/run/sandbox:/var/run/sandbox:rw
      # Dev bind-mounts for hot reload (Zed + desktop configs)
      # Note: Config dirs are :rw because GOW entrypoint does chmod +x on startup.sh
      - ./zed-build:/helix-dev/zed-build:ro
      - ./desktop/sway-config:/helix-dev/sway-config:rw
      - ./desktop/zorin-config:/helix-dev/zorin-config:rw
      - ./desktop/ubuntu-config:/helix-dev/ubuntu-config:rw
      - ./desktop/xfce-config:/helix-dev/xfce-config:rw
      - ./desktop/kde-config:/helix-dev/kde-config:rw
      - ./desktop/shared:/helix-dev/shared:ro
      - ./desktop/sway-config/setup-telemetry-firewall.sh:/etc/cont-init.d/09-setup-telemetry-firewall.sh
      # Sandbox data volume for workspaces - mounted at same path in sandbox and dev containers
      # This enables Hydra bind-mount compatibility (see design/2025-12-01-hydra-bind-mount-symlink.md)
      # Set HELIX_SANDBOX_DATA to a host path (e.g., /prod/helix-workspaces) for ZFS dedup
      - ${HELIX_SANDBOX_DATA:-sandbox-data}:/data
      # Host Docker socket (legacy, may be removed — docker-in-desktop mode
      # runs dockerd inside the desktop container instead)
      - /var/run/docker.sock:/var/run/host-docker.sock:rw
      # Desktop image versions and registry refs (bind-mounted for hot-reload)
      # NOT read-only: sandbox startup writes .runtime-ref files here during registry pulls
      # Adding new desktops requires no changes here - just add to sandbox-images/
      - ./sandbox-images:/opt/images
    device_cgroup_rules:
      - "c 13:* rmw"
    devices:
      - /dev/dri
      - /dev/uinput
      - /dev/uhid
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    cap_add:
      - SYS_PTRACE # Thread diagnostics
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "docker info > /dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Unified Helix Sandbox for AMD/Intel GPUs - Docker-in-Docker with direct WebSocket video streaming
  # Desktop containers stream video directly via WebSocket (no Wolf/Moonlight)
  # Uses device pass-through instead of nvidia runtime
  sandbox-amd-intel:
    profiles: [code-amd-intel]
    image: ${SANDBOX_IMAGE:-helix-sandbox:latest}
    networks:
      - default
    environment:
      # AMD/Intel GPU configuration (no NVIDIA variables)
      - GPU_VENDOR=${GPU_VENDOR:-intel}
      # Docker nesting depth for address pool isolation (incremented at each level)
      - HELIX_DOCKER_DEPTH=${HELIX_DOCKER_DEPTH:-1}
      # Helix dev mode (enables bind-mounts for hot reload)
      - HELIX_DEV_MODE=true
      - ZED_IMAGE=helix-sway:latest
      # Debug: keep dead desktop containers for inspection (default: false = auto-remove)
      - HELIX_KEEP_DEAD_CONTAINERS=${HELIX_KEEP_DEAD_CONTAINERS:-false}
      # Pre-pull experimental desktop images at startup (space-separated, e.g. "sway zorin").
      # Default empty: only production desktops (helix-ubuntu) are pulled on upgrade.
      - HELIX_EXPERIMENTAL_DESKTOPS=${HELIX_EXPERIMENTAL_DESKTOPS:-}
      # Sandbox data path for workspaces (must match volume mount)
      - SANDBOX_DATA_PATH=/data
      # Container Docker path for ZFS-backed inner dockerd (macOS desktop app)
      - CONTAINER_DOCKER_PATH=${CONTAINER_DOCKER_PATH:-}
      # RevDial configuration (connect sandbox to API)
      - HELIX_API_URL=http://api:8080
      - HELIX_API_BASE_URL=http://api:8080
      - SANDBOX_INSTANCE_ID=local
      - RUNNER_TOKEN=${RUNNER_TOKEN-oh-hallo-insecure-token}
      # Hydra multi-Docker isolation (per-scope dockerd for each agent session)
      - HYDRA_ENABLED=${HYDRA_ENABLED:-true}
      - HYDRA_PRIVILEGED_MODE_ENABLED=${HYDRA_PRIVILEGED_MODE_ENABLED:-true}
      # Runtime configuration
      - XDG_RUNTIME_DIR=/tmp/sockets
      - GST_DEBUG=3
      - GOP_SIZE=${GOP_SIZE:-240}
      - HELIX_HOSTNAME=${HELIX_HOSTNAME:-localhost}
    privileged: true # Required for Docker-in-Docker
    volumes:
      # Desktop configuration and state
      - ./desktop/:/etc/helix/desktop/:rw
      # Config template - bind-mounted for faster iteration (no rebuild needed)
      - ./desktop/config.toml.template:/opt/desktop-defaults/config.toml.template:ro
      - /tmp/sockets:/tmp/sockets:rw
      - ${SANDBOX_DOCKER_STORAGE:-sandbox-docker-storage}:/var/lib/docker
      # Container Docker path for per-session inner dockerd (ZFS on macOS, named volume on Linux)
      - ${CONTAINER_DOCKER_PATH:-sandbox-container-docker}:/container-docker
      # Hydra data dir — shared BuildKit cache for cross-session build caching
      - hydra-data:/hydra-data
      - /dev/:/dev/:rw
      - /run/udev:/run/udev:rw
      - /var/run/sandbox:/var/run/sandbox:rw
      # Dev bind-mounts for hot reload (Zed + desktop configs)
      # Note: Config dirs are :rw because GOW entrypoint does chmod +x on startup.sh
      - ./zed-build:/helix-dev/zed-build:ro
      - ./desktop/sway-config:/helix-dev/sway-config:rw
      - ./desktop/zorin-config:/helix-dev/zorin-config:rw
      - ./desktop/ubuntu-config:/helix-dev/ubuntu-config:rw
      - ./desktop/xfce-config:/helix-dev/xfce-config:rw
      - ./desktop/kde-config:/helix-dev/kde-config:rw
      - ./desktop/shared:/helix-dev/shared:ro
      - ./desktop/sway-config/setup-telemetry-firewall.sh:/etc/cont-init.d/09-setup-telemetry-firewall.sh
      # Sandbox data volume for workspaces - mounted at same path in sandbox and dev containers
      # This enables Hydra bind-mount compatibility (see design/2025-12-01-hydra-bind-mount-symlink.md)
      # Set HELIX_SANDBOX_DATA to a host path (e.g., /prod/helix-workspaces) for ZFS dedup
      - ${HELIX_SANDBOX_DATA:-sandbox-data}:/data
      # Host Docker socket (legacy, may be removed — docker-in-desktop mode
      # runs dockerd inside the desktop container instead)
      - /var/run/docker.sock:/var/run/host-docker.sock:rw
      # Desktop image versions and registry refs (bind-mounted for hot-reload)
      # NOT read-only: sandbox startup writes .runtime-ref files here during registry pulls
      # Adding new desktops requires no changes here - just add to sandbox-images/
      - ./sandbox-images:/opt/images
    device_cgroup_rules:
      - "c 13:* rmw"
    devices:
      - /dev/dri
      - /dev/uinput
      - /dev/uhid
    # No nvidia runtime for AMD - uses device pass-through instead
    cap_add:
      - SYS_PTRACE # Thread diagnostics
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "docker info > /dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Software rendering sandbox (CPU-only, no GPU required)
  # Use: docker compose --profile code-software up sandbox-software
  # Note: This is a separate service because it needs different device mounts
  # and no nvidia runtime - you can't just set GPU_VENDOR=none on regular sandbox
  sandbox-software:
    profiles: [code-software]
    image: ${SANDBOX_IMAGE:-helix-sandbox:latest}
    networks:
      - default
    environment:
      # Software rendering (CPU-only, no GPU)
      - GPU_VENDOR=none
      - LIBGL_ALWAYS_SOFTWARE=1
      - MESA_GL_VERSION_OVERRIDE=4.5
      # Docker nesting depth for address pool isolation (incremented at each level)
      - HELIX_DOCKER_DEPTH=${HELIX_DOCKER_DEPTH:-1}
      # Helix dev mode (enables bind-mounts for hot reload)
      - HELIX_DEV_MODE=true
      - ZED_IMAGE=helix-sway:latest
      # Debug: keep dead desktop containers for inspection (default: false = auto-remove)
      - HELIX_KEEP_DEAD_CONTAINERS=${HELIX_KEEP_DEAD_CONTAINERS:-false}
      # Pre-pull experimental desktop images at startup (space-separated, e.g. "sway zorin").
      # Default empty: only production desktops (helix-ubuntu) are pulled on upgrade.
      - HELIX_EXPERIMENTAL_DESKTOPS=${HELIX_EXPERIMENTAL_DESKTOPS:-}
      # Sandbox data path for workspaces (must match volume mount)
      - SANDBOX_DATA_PATH=/data
      # Container Docker path for ZFS-backed inner dockerd (macOS desktop app)
      - CONTAINER_DOCKER_PATH=${CONTAINER_DOCKER_PATH:-}
      # RevDial configuration (connect sandbox to API)
      - HELIX_API_URL=http://api:8080
      - HELIX_API_BASE_URL=http://api:8080
      - SANDBOX_INSTANCE_ID=local
      - RUNNER_TOKEN=${RUNNER_TOKEN-oh-hallo-insecure-token}
      # Hydra multi-Docker isolation (per-scope dockerd for each agent session)
      - HYDRA_ENABLED=${HYDRA_ENABLED:-true}
      - HYDRA_PRIVILEGED_MODE_ENABLED=${HYDRA_PRIVILEGED_MODE_ENABLED:-true}
      # Runtime configuration
      - XDG_RUNTIME_DIR=/tmp/sockets
      - GST_DEBUG=3
      - GOP_SIZE=${GOP_SIZE:-240}
      - HELIX_HOSTNAME=${HELIX_HOSTNAME:-localhost}
    privileged: true # Required for Docker-in-Docker
    volumes:
      # Desktop configuration and state
      - ./desktop/:/etc/helix/desktop/:rw
      # Config template - bind-mounted for faster iteration (no rebuild needed)
      - ./desktop/config.toml.template:/opt/desktop-defaults/config.toml.template:ro
      - /tmp/sockets:/tmp/sockets:rw
      - ${SANDBOX_DOCKER_STORAGE:-sandbox-docker-storage}:/var/lib/docker
      # Container Docker path for per-session inner dockerd (ZFS on macOS, named volume on Linux)
      - ${CONTAINER_DOCKER_PATH:-sandbox-container-docker}:/container-docker
      # Hydra data dir — shared BuildKit cache for cross-session build caching
      - hydra-data:/hydra-data
      - /run/udev:/run/udev:rw
      - /var/run/sandbox:/var/run/sandbox:rw
      # Dev bind-mounts for hot reload (Zed + desktop configs)
      # Note: Config dirs are :rw because GOW entrypoint does chmod +x on startup.sh
      - ./zed-build:/helix-dev/zed-build:ro
      - ./desktop/sway-config:/helix-dev/sway-config:rw
      - ./desktop/zorin-config:/helix-dev/zorin-config:rw
      - ./desktop/ubuntu-config:/helix-dev/ubuntu-config:rw
      - ./desktop/xfce-config:/helix-dev/xfce-config:rw
      - ./desktop/kde-config:/helix-dev/kde-config:rw
      - ./desktop/shared:/helix-dev/shared:ro
      - ./desktop/sway-config/setup-telemetry-firewall.sh:/etc/cont-init.d/09-setup-telemetry-firewall.sh
      # Sandbox data volume for workspaces - mounted at same path in sandbox and dev containers
      # This enables Hydra bind-mount compatibility (see design/2025-12-01-hydra-bind-mount-symlink.md)
      # Set HELIX_SANDBOX_DATA to a host path (e.g., /prod/helix-workspaces) for ZFS dedup
      - ${HELIX_SANDBOX_DATA:-sandbox-data}:/data
      # Host Docker socket (legacy, may be removed — docker-in-desktop mode
      # runs dockerd inside the desktop container instead)
      - /var/run/docker.sock:/var/run/host-docker.sock:rw
      # Desktop image versions and registry refs (bind-mounted for hot-reload)
      # NOT read-only: sandbox startup writes .runtime-ref files here during registry pulls
      # Adding new desktops requires no changes here - just add to sandbox-images/
      - ./sandbox-images:/opt/images
    # No device mounts for software rendering (no GPU)
    device_cgroup_rules:
      - "c 13:* rmw"
    devices:
      - /dev/uinput
      - /dev/uhid
    # No nvidia runtime for software rendering
    cap_add:
      - SYS_PTRACE # Thread diagnostics
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "docker info > /dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # macOS ARM sandbox (virtio-gpu with VideoToolbox encoding via vsock)
  # Use: docker compose --profile code-macos up sandbox-macos
  # For macOS hosts running UTM VMs with virtio-gpu
  sandbox-macos:
    profiles: [code-macos]
    image: ${SANDBOX_IMAGE:-helix-sandbox:latest}
    networks:
      - default
    environment:
      # virtio-gpu GPU acceleration (vendor ID 0x1af4)
      - GPU_VENDOR=virtio
      # Helix dev mode (enables bind-mounts for hot reload)
      - HELIX_DEV_MODE=true
      - ZED_IMAGE=helix-ubuntu:latest
      # Debug: keep dead desktop containers for inspection (default: false = auto-remove)
      - HELIX_KEEP_DEAD_CONTAINERS=${HELIX_KEEP_DEAD_CONTAINERS:-false}
      # Pre-pull experimental desktop images at startup (space-separated, e.g. "sway zorin").
      # Default empty: only production desktops (helix-ubuntu) are pulled on upgrade.
      - HELIX_EXPERIMENTAL_DESKTOPS=${HELIX_EXPERIMENTAL_DESKTOPS:-}
      # Sandbox data path for workspaces (must match volume mount)
      - SANDBOX_DATA_PATH=/data
      # Container Docker path — ZFS-backed storage for per-session inner dockerd
      # and BuildKit state. Hydra bind-mounts subdirs into desktop containers.
      # Set by macOS desktop app; unset on Linux (uses Docker named volumes instead).
      - CONTAINER_DOCKER_PATH=${CONTAINER_DOCKER_PATH:-}
      # RevDial configuration (connect sandbox to API)
      - HELIX_API_URL=http://api:8080
      - HELIX_API_BASE_URL=http://api:8080
      - SANDBOX_INSTANCE_ID=local
      - RUNNER_TOKEN=${RUNNER_TOKEN-oh-hallo-insecure-token}
      # Hydra multi-Docker isolation (per-scope dockerd for each agent session)
      - HYDRA_ENABLED=${HYDRA_ENABLED:-true}
      - HYDRA_PRIVILEGED_MODE_ENABLED=${HYDRA_PRIVILEGED_MODE_ENABLED:-true}
      # Runtime configuration
      - XDG_RUNTIME_DIR=/tmp/sockets
      - GST_DEBUG=3
      - GOP_SIZE=${GOP_SIZE:-240}
      - HELIX_HOSTNAME=${HELIX_HOSTNAME:-localhost}
      # QEMU frame export port — helix-frame-export listens on this port on the host.
      # Desktop containers connect to 10.0.2.2:<port> via SLiRP to reach it.
      # Default 15937; macOS desktop app overrides via .env.vm.
      - HELIX_FRAME_EXPORT_PORT=${HELIX_FRAME_EXPORT_PORT:-15937}
    privileged: true # Required for Docker-in-Docker
    volumes:
      # Desktop configuration and state
      - ./desktop/:/etc/helix/desktop/:rw
      # Config template - bind-mounted for faster iteration (no rebuild needed)
      - ./desktop/config.toml.template:/opt/desktop-defaults/config.toml.template:ro
      - /tmp/sockets:/tmp/sockets:rw
      # Sandbox's own Docker storage — bind mount on root disk so pre-baked
      # desktop images survive the ZFS mount over /var/lib/docker/volumes/.
      # Named volumes get hidden when helix/docker-volumes ZFS dataset mounts;
      # a bind mount outside Docker's volume path avoids this.
      - ${SANDBOX_DOCKER_VOLUME:-/var/lib/helix-sandbox-docker}:/var/lib/docker
      # Container Docker path — ZFS zvol mounted by macOS desktop app for
      # per-session inner dockerd data (dedup + compression).
      # CONTAINER_DOCKER_PATH is set by the macOS desktop app in .env.vm.
      - ${CONTAINER_DOCKER_PATH:-sandbox-container-docker}:/container-docker
      # Hydra data dir — shared BuildKit cache for cross-session build caching
      - hydra-data:/hydra-data
      - /run/udev:/run/udev:rw
      - /var/run/sandbox:/var/run/sandbox:rw
      # DRM lease manager socket directory (helix-drm-manager systemd service on VM host).
      # Directory mount (not file) so the socket survives DRM manager restarts.
      - /run/helix-drm:/run/helix-drm:rw
      # Dev bind-mounts for hot reload (Zed + desktop configs)
      # Note: Config dirs are :rw because GOW entrypoint does chmod +x on startup.sh
      - ./zed-build:/helix-dev/zed-build:ro
      - ./desktop/sway-config:/helix-dev/sway-config:rw
      - ./desktop/zorin-config:/helix-dev/zorin-config:rw
      - ./desktop/ubuntu-config:/helix-dev/ubuntu-config:rw
      - ./desktop/xfce-config:/helix-dev/xfce-config:rw
      - ./desktop/kde-config:/helix-dev/kde-config:rw
      - ./desktop/shared:/helix-dev/shared:ro
      - ./desktop/sway-config/setup-telemetry-firewall.sh:/etc/cont-init.d/09-setup-telemetry-firewall.sh
      # Sandbox data volume for workspaces - mounted at same path in sandbox and dev containers
      # This enables Hydra bind-mount compatibility (see design/2025-12-01-hydra-bind-mount-symlink.md)
      - sandbox-data:/data
      # Host Docker socket for privileged mode (Helix-in-Helix development)
      # Only used when HYDRA_PRIVILEGED_MODE_ENABLED=true and agent requests UseHostDocker
      - /var/run/docker.sock:/var/run/host-docker.sock:rw
      # Desktop image tarballs and versions (bind-mounted for hot-reload)
      # Adding new desktops requires no changes here - just add to sandbox-images/
      - ./sandbox-images:/opt/images:ro
    # virtio-gpu device mounts
    device_cgroup_rules:
      - "c 13:* rmw"
      - "c 226:* rmw" # DRM devices for virtio-gpu
    devices:
      - /dev/uinput
      - /dev/uhid
      - /dev/dri # DRM render nodes for virtio-gpu
    # No nvidia runtime for virtio-gpu
    cap_add:
      - SYS_PTRACE # Thread diagnostics
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "docker info > /dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  demos:
    profiles: ["demos"]
    build:
      context: .
      dockerfile: Dockerfile.demos
    ports:
      - ${DEMOS_PORT:-8085}:8085
    restart: always
    env_file:
      - .env
    environment:
      - PORT=8085
    entrypoint: ${DEMOS_ENTRYPOINT:-tail -f /dev/null}
    volumes:
      - ./go.mod:/app/go.mod
      - ./go.sum:/app/go.sum
      - ./demos:/app/demos

  frontend:
    # ports:
    #   - 8081:${FRONTEND_INTERNAL_PORT:-8081}
    build:
      context: .
      dockerfile: Dockerfile
      target: ui-dev-env
    restart: always
    volumes:
      # Mount source code for hot reload, but preserve container's node_modules
      - ./frontend/src:/app/src
      - ./frontend/assets:/app/assets
      - ./frontend/index.html:/app/index.html
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/package.json:/app/package.json
      - ./frontend/yarn.lock:/app/yarn.lock
      # Preserve node_modules from image build (don't mount from host)
      - /app/node_modules

volumes:
  helix-postgres-db:
  helix-vectorchord-kodit:
  helix-filestore:
  helix-socket:
  sandbox-socket:
  sandbox-container-docker: # Per-session inner dockerd storage (ZFS on macOS, named volume on Linux)
  sandbox-docker-storage: # Sandbox isolated dockerd storage (sandboxes + devcontainers)
  sandbox-data: # Workspace data for dev containers - mounted at /data in sandbox and dev containers
  hydra-data: # Hydra data dir (shared BuildKit cache)
  zed-work:
  registry-data: # Local registry storage for efficient desktop image transfers

  go-pkg-mod: # Go module cache
  go-build-cache: # Go build cache
  go-sdk-cache: # Go toolchain/SDK cache
  # No persistent volumes for zed workspaces - using tmpfs for clean sessions

networks:
  default:
    name: ${HELIX_NETWORK_NAME:-helix_default}
